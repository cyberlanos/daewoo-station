  - type: Card
    name: card-sc-four-of-sparrows
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_4_of_Sparrows_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]

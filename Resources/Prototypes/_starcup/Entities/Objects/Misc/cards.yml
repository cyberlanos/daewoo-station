#file: noinspection SpellCheckingInspection
- type: entity
  parent: CardBoxBase
  id: CardBoxSparot
  name: "коробка колоди спароту"
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: box
    layers:
    - state: copper_box
      map: [ "closeLayer" ]
    - state: copper_box_open
      map: [ "openLayer" ]
      visible: false
    - state: copper_box
      map: [ "fullLayer" ]
      visible: false
  - type: OpenTriggeredStorageFill
    contents:
    - id: CardDeckSparot
      amount: 1

- type: entity
  parent: CardDeckBase
  id: CardDeckSparot
  name: "колода карт"
  components:
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: deck_sparot_full
  - type: CardStack
    content:
    - CardScDevil
    - CardScClown
    # Cables
    - CardScAceOfCables
    - CardScTwoOfCables
    - CardScThreeOfCables
    - CardScFourOfCables
    - CardScFiveOfCables
    - CardScSixOfCables
    - CardScSevenOfCables
    - CardScEightOfCables
    - CardScNineOfCables
    - CardScTenOfCables
    - CardScKnightOfCables
    - CardScPrincessOfCables
    - CardScQueenOfCables
    # Discs
    - CardScAceOfDiscs
    - CardScTwoOfDiscs
    - CardScThreeOfDiscs
    - CardScFourOfDiscs
    - CardScFiveOfDiscs
    - CardScSixOfDiscs
    - CardScSevenOfDiscs
    - CardScEightOfDiscs
    - CardScNineOfDiscs
    - CardScTenOfDiscs
    - CardScKnightOfDiscs
    - CardScPrincessOfDiscs
    - CardScQueenOfDiscs
    # Knives
    - CardScAceOfKnives
    - CardScTwoOfKnives
    - CardScThreeOfKnives
    - CardScFourOfKnives
    - CardScFiveOfKnives
    - CardScSixOfKnives
    - CardScSevenOfKnives
    - CardScEightOfKnives
    - CardScNineOfKnives
    - CardScTenOfKnives
    - CardScKnightOfKnives
    - CardScPrincessOfKnives
    - CardScQueenOfKnives
    # Sparrows
    - CardScAceOfSparrows
    - CardScTwoOfSparrows
    - CardScThreeOfSparrows
    - CardScFourOfSparrows
    - CardScFiveOfSparrows
    - CardScSixOfSparrows
    - CardScSevenOfSparrows
    - CardScEightOfSparrows
    - CardScNineOfSparrows
    - CardScTenOfSparrows
    - CardScKnightOfSparrows
    - CardScPrincessOfSparrows
    - CardScQueenOfSparrows

- type: entity
  parent: BaseItem
  id: CardBaseSparot
  name: "карта"
  categories: [ HideSpawnMenu ]
  components:
  - type: EmitSoundOnLand
    sound:
      collection: cardShove
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: singlecard_down_sparot
  - type: Rotatable
  - type: Item
    size: Tiny
  - type: UseDelay
    delay: 0.5
  - type: Card
    backSpriteLayers:
    - sprite: EstacaoPirata/Objects/Misc/cards.rsi
      state: singlecard_down_sparot
    flipped: true

# Fantasia
- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScDevil
  description: "Бліда демонічна постать чатувала на роздоріжжі; обидва шляхи ведуть у темряву. Вибір, спокуса, цикли, невідоме."
  components:
  - type: Card
    name: card-sc-devil
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_The_Devil_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScClown
  description: "Веселий арлекін танцює над шаленим пеклом. Лихо, різка зміна, перетворення."
  components:
  - type: Card
    name: card-sc-clown
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_The_Clown_sparot

# Cables
- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScAceOfCables
  description: "Поганка проростає з ґрунту, її мідний міцелій розростається в усі боки. Нові зв’язки, зміни способу життя."
  components:
  - type: Card
    name: card-sc-ace-of-cables
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_Ace_of_Cables_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScTwoOfCables
  description: "Два мідні кабелі, потріскуючи електрикою, обвивають залізний стрижень і утворюють електромагніт. Союз, рівновага, спілкування."
  components:
  - type: Card
    name: card-sc-two-of-cables
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_2_of_Cables_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScThreeOfCables
  description: "Три мідні кабелі утворюють шпалеру для виноградних лоз, обтяжених плодами. Святкування, вправа, потурання собі, веселощі."
  components:
  - type: Card
    name: card-sc-three-of-cables
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_3_of_Cables_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScFourOfCables
  description: "Чотири барвисті труби вставлені в трубний колектор і спрямовані в чотири різні боки. Дистанція, відпочинок, надання стосункам простору."
  components:
  - type: Card
    name: card-sc-four-of-cables
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_4_of_Cables_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScFiveOfCables
  description: "П’ять голів золотої венериної мухоловки люто б’ються одна з одною, роздираючи власне тіло. Розрив, травма, любов перетворюється на ненависть."
  components:
  - type: Card
    name: card-sc-five-of-cables
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_5_of_Cables_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScSixOfCables
  description: "Шість зруйнованих радіовеж здіймаються серед величезного пустельного ландшафту білого снігу. Видно маленькі постаті, що їх лагодять. Лагодження, возз’єднання, повернення зв’язку з минулим."
  components:
  - type: Card
    name: card-sc-six-of-cables
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_6_of_Cables_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScSevenOfCables
  description: "Гілки семи могутніх сталекапів переплітаються над захаращеним відділом гідропоніки. Квітучі колючі пагони повзуть по корінню дерев. Налагодження контактів, оцінка власного становища, приховані вразливості."
  components:
  - type: Card
    name: card-sc-seven-of-cables
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_7_of_Cables_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScEightOfCables
  description: "Термоелектричний генератор наповнює своє павутинне оточення теплим сяйвом. Холодний і гарячий контури розташовані навпаки й розділені у вісім різних напрямків. Повернення своїми слідами, нездатність змінитися, повторення помилок."
  components:
  - type: Card
    name: card-sc-eight-of-cables
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_8_of_Cables_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScNineOfCables
  description: "Дев’ять каучуконосів захисним кільцем ростуть навколо погризеного та потерто обтріпаного високовольтного кабелю. Вразливість, слабкість, прояснення справжніх почуттів."
  components:
  - type: Card
    name: card-sc-nine-of-cables
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_9_of_Cables_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScTenOfCables
  description: "Десять мідяних кленових листків падають у стрімку річку. Мирна смерть, дорогоцінна минущість, дружні розставання."
  components:
  - type: Card
    name: card-sc-ten-of-cables
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_10_of_Cables_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScKnightOfCables
  description: "Лицарка підносить мідний спис на вершині гори. Грозові хмари вгорі тріщать і плюються блискавками. Та, хто бореться за зв’язки зі світом, за близьких або проти хвороби."
  components:
  - type: Card
    name: card-sc-knight-of-cables
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_Knight_of_Cables_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScPrincessOfCables
  description: "Принцеса стоїть на вершині радіовежі, усміхаючись до квітучих полів унизу. Та, хто заохочує утворення зв’язків; та, хто вимагає від інших дбати про себе або про інших, іноді про неї саму."
  components:
  - type: Card
    name: card-sc-princess-of-cables
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_Princess_of_Cables_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScQueenOfCables
  description: "Королева лагідно налаштовує лампу для кількох тендітних іпомей, спрямовуючи їх рости павутинною шпалерою. Та, хто плекає, хто зцілює; та, хто досконало пов’язана з іншими."
  components:
  - type: Card
    name: card-sc-queen-of-cables
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_Queen_of_Cables_sparot

# Discs
- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScAceOfDiscs
  description: "Ліхтарик світить на дискету, покинуту в темряві. Сміливі нові починання, нова історія, багатообіцяюча таємниця."
  components:
  - type: Card
    name: card-sc-ace-of-discs
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_Ace_of_Discs_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScTwoOfDiscs
  description: "Пара дзеркальних дисків обертається один навколо одного в чорноті космосу. У відбитті одного видно далеку будівлю, що вибухає надновою. Рівновага, об’єктивність, гнучкість, приховані ракурси."
  components:
  - type: Card
    name: card-sc-two-of-discs
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_2_of_Discs_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScThreeOfDiscs
  description: "Три медалі лежать на столі, заваленому книгами та паперами. Командна робота, вдячність, групова праця."
  components:
  - type: Card
    name: card-sc-three-of-discs
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_3_of_Discs_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScFourOfDiscs
  description: "Ревуча Тесла лежить у стримувальному полі, оточена чотирма сяйними дисками. Віддзеркалення, обережне планування бюджету, стриманість."
  components:
  - type: Card
    name: card-sc-four-of-discs
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_4_of_Discs_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScFiveOfDiscs
  description: "П’ять дисків лежать розбиті на підлозі. З тріщин сяє призматичне світло. Втрата пам’яті, помилки, руїна, небезпечне знання."
  components:
  - type: Card
    name: card-sc-five-of-discs
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_5_of_Discs_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScSixOfDiscs
  description: "Шість технологічних дисків лежать біля дослідницького сервера. Щедрість, достаток, обмін таємницями, розповідання історій."
  components:
  - type: Card
    name: card-sc-six-of-discs
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_6_of_Discs_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScSevenOfDiscs
  description: "Сім барвистих сяйних дисків оточують посудину аномалії в яскраво освітленій лабораторії. Коридори за нею темні. Інвестиція, наполегливість, скупість, корисна зачіпка."
  components:
  - type: Card
    name: card-sc-seven-of-discs
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_7_of_Discs_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScEightOfDiscs
  description: "Зламаний контейнер артефакта лежить у вигорілій оболонці дослідницької лабораторії. Вісім брудних комп’ютерних дисків лежать на обвугленій книжковій полиці. Марні зусилля, безперспективні зачіпки, чіпляння за непотрібні ресурси."
  components:
  - type: Card
    name: card-sc-eight-of-discs
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_8_of_Discs_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScNineOfDiscs
  description: "Аномалії плоті, лози й темряви оточують тіньове дерево з фіолетовим листям. Дев’ять дослідницьких дисків заплуталися в його гілках. Міфи, кошмари, замулена істина, небажані відповіді."
  components:
  - type: Card
    name: card-sc-nine-of-discs
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_9_of_Discs_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScTenOfDiscs
  description: "Десять круглих ілюмінаторів шатла сяють на золотий світанок, створюючи крихітні веселки світла всередині шатла. Розгадані таємниці, мудрість, стабільність, процвітання."
  components:
  - type: Card
    name: card-sc-ten-of-discs
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_10_of_Discs_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScKnightOfDiscs
  description: "Лицарка виставляє сяйний круглий щит проти наступальних тіньових вусиків, не даючи їм дістатися книги, яку вона тримає в другій руці. Та, хто бореться за істину, або та, хто стримує небезпечні речі."
  components:
  - type: Card
    name: card-sc-knight-of-discs
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_Knight_of_Discs_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScPrincessOfDiscs
  description: "Кіборг у тіарі принцеси замінює лампочку, проливаючи світло на ідилічну бібліотеку. Його панель лишена відкритою, відкриваючи всередині дископодібний позитронний мозок. Та, хто заохочує інших навчатися, хто вимагає кмітливості та обачності; ключова свідка."
  components:
  - type: Card
    name: card-sc-princess-of-discs
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_Princess_of_Discs_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScQueenOfDiscs
  description: "Обличчя прекрасної королеви сяє з екрана ядра ШІ. Екрани незліченних комп’ютерів звернені до неї, купаючи її в променистому світлі. Та, хто має велике багатство або знання, плекає, захищає і спрямовує."
  components:
  - type: Card
    name: card-sc-queen-of-discs
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_Queen_of_Discs_sparot

# Knives
- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScAceOfKnives
  description: "Зазубрений ніж розрізає свіжий буханець хліба. Нова мета, зародження суперництва."
  components:
  - type: Card
    name: card-sc-ace-of-knives
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_Ace_of_Knives_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScTwoOfKnives
  description: "Два бойові ножі стирчать із землі, довший під кутом і нахилений через інший. Переламування ситуації, вирівняні долі."
  components:
  - type: Card
    name: card-sc-two-of-knives
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_2_of_Knives_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScThreeOfKnives
  description: "Три метальні ножі глибоко встромлені у стояче дзеркало. З тріщин витікає кров. Розкриті почуття, вороги стають коханими, кохані стають ворогами."
  components:
  - type: Card
    name: card-sc-three-of-knives
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_3_of_Knives_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScFourOfKnives
  description: "Екзоморф-ривач згорнувся у своїй норі, а чотири кухонні ножі безрезультатно стирчать у його хвості. Прийняття обмежень, коротке затишшя."
  components:
  - type: Card
    name: card-sc-four-of-knives
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_4_of_Knives_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScFiveOfKnives
  description: "За розбитим вікном станції п’ять закривавлених уламків скла витягнуло до зірок. Катастрофа, зрада, повне приниження."
  components:
  - type: Card
    name: card-sc-five-of-knives
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_5_of_Knives_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScSixOfKnives

  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScQueenOfSparrows
  description: "Космічний дракон у короні королеви лагідно спрямовує орбіту землеподібної планети; її хвіст тримає пензель, вкритий зоряним пилом. Та, хто повністю налаштована на власні емоції; порадниця; клоунеса; провідниця крізь невідоме."
  components:

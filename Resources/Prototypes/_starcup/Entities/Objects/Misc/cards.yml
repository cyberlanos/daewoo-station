  - type: Card
    name: card-sc-six-of-sparrows
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_6_of_Sparrows_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScSevenOfSparrows
  description: "Сім зозуль висовують голови крізь однакові розломи і, виринаючи з просторових розломів позаду себе, цікаво дивляться на власні спини. Забагато емоцій; плутанина і фантазія; подорож усередину, щоб осмислити речі."
  components:
  - type: Card
    name: card-sc-seven-of-sparrows
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_7_of_Sparrows_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScEightOfSparrows
  description: "Тьмяна стара курка зупиняється на півдорозі через широку безлюдну дорогу; за нею тягнуться сім однакових полеглих курей дедалі яскравіших відтінків. Вона дивиться на два вогні, що швидко наближаються. Загубленість і втома; виснажлива подорож."
  components:
  - type: Card
    name: card-sc-eight-of-sparrows
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_8_of_Sparrows_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScNineOfSparrows
  description: "Звивиста дорога веде крізь снігову пустку. Дев’ять крячків ховаються в самотній смоківниці, але їхні очі спрямовані на мету дороги — роззявлену пащу величезного скелета дракона. Кінець близько; справжній сенс подорожі стає ясним; роздоріж більше немає, але вибір завжди лишається."

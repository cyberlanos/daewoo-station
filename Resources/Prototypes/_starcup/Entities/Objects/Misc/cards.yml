  description: "Чотири прекрасні червонокрилі чорні дрозди дряпають і шматують просту чорну ворону, розбризкуючи кров по сувою, який вона несе. Творчість, спрямована на руйнування; хибний поворот заводить когось у небезпеку; радість стає смутком."
  components:
  - type: Card
    name: card-sc-five-of-sparrows
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_5_of_Sparrows_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScSixOfSparrows
  description: "Шість горобців спускаються в пухові гнізда, збудовані на голові величезного сплячого космічного дракона. Від лап деяких горобців тягнуться темні стрічки. Пошук затишку в знайомому; дозвіл іншим іти наступною подорожжю."

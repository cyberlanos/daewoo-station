  - type: Card
    name: card-sc-nine-of-sparrows
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_9_of_Sparrows_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]

  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScPrincessOfSparrows
  description: "Принцеса щасливо плескає, отримуючи від зграї завзятих співочих птахів свій портрет; він приєднується до її величезної купи книг, інструментів і прикрас. Акулячий мальок згорнувся біля її ніг, мов вірний пес. Та, хто надихає мистецтво або провокує емоції; жартівниця; та, хто вимагає щирості й цікавості."

  description: "Гніздо з десяти схожих на коштовності лялечок викидає на піщаний берег; вони починають вилуплюватися в колібрі. Ці люди взагалі знають, як працювали земні птахи? Перетворення завершується; новий дім; досягнений катарсис."
  components:
  - type: Card
    name: card-sc-ten-of-sparrows
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_10_of_Sparrows_sparot

- type: entity
  parent: CardBaseSparot
  categories: [ HideSpawnMenu ]
  id: CardScKnightOfSparrows
  description: "Лицар-гарпія у головній пов’язці покоївки лагідно усміхається, показуючи фігурку з кінською головою гарчливому космічному дракону; голова дракона лежить у нього на колінах. Той, хто бореться за почуття і мистецтво; безстрашний дослідник; інтуїтивний мислитель."

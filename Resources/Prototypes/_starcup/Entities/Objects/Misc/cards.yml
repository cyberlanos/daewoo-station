  categories: [ HideSpawnMenu ]
  id: CardScFourOfSparrows
  description: "Коли сонце визирає з-за горизонту, один маленький бурий кажан приєднується до трьох інших, що висять під карнизом над прекрасним абстрактним муралом. Безпечні прихистки; шанс насолодитися досягненнями; місце для відпочинку."

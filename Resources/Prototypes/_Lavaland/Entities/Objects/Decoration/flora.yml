- type: entity
  id: BaseLavalandFlora
  abstract: true
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
  - type: Clickable
  - type: InteractionOutline
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  name: "запилений кущ"
  id: FloraAshBush
  parent: BaseLavalandFlora
  description: "Кущ, вкритий попелом. Може здаватися мертвим, але насправді він живий!"
  components:
  - type: Sprite
    sprite: _Lavaland/Objects/Decoration/Flora/Misc/bush.rsi
    layers:
    - state: bush1
      map: ["random"]
  - type: RandomSprite
    available:
    - random:
        bush1: ""
        bush2: ""
        bush3: ""
        bush4: ""
        bush5: ""
        bush6: ""
        bush7: ""

- type: entity
  abstract: true
  parent: MarkerBase
  id: ProximitySpawnerBase
  name: "спавнер наближення"
  description: "Спавнер, що спрацьовує, коли поруч є гравець."
  components:
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.5
        mask:
        - MachineMask
        layer:
        - MachineLayer
        density: 10
  - type: TriggerOnProximity
    requiresAnchored: false
    repeating: false
    triggerSpeed: 0
    shape:
      !type:PhysShapeCircle
      radius: 20 # Updates with a 5-second delay, so it has to be that large
    layer:
    - MobMask
  - type: WhitelistTriggerCondition
    userWhitelist:
      components:
      - Actor # Triggers only from players
  - type: Appearance
  - type: DeleteOnTrigger

- type: entity
  name: "мачете"
  parent: [ BaseItem, BaseMajorContraband ]
  id: SlasherMachete
  description: "Великий, зловісний на вигляд клинок."
  components:
  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0
    decapitation: true
  - type: Tag
    tags:
    - Machete
  - type: Sprite
    sprite: _Goobstation/Objects/Specific/Slasher/machete.rsi
    state: icon
  - type: MeleeWeapon
    animationRotation: -45
    wideAnimationRotation: -135
    damage:
      types:
        Slash: 15
    soundHit:
      path: /Audio/_Goobstation/Weapons/Melee/slashermachetehit.ogg
      params:
        volume: -6
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 30
  - type: Item
    size: Large
    storedSprite:
      state: storage
      sprite: _Goobstation/Objects/Specific/Slasher/machete.rsi
    shape:
    - 0,0,0,2
  - type: Tool
    qualities:
    - Slicing
  - type: DisarmMalus
  - type: SlasherMassacreMachete
  - type: Prying
    pryPowered: True
    speedModifier: 1.5
  - type: ThrowingAngle
    angle: 225

- type: entity
  parent: WeldingMaskBase
  id: ClothingHeadHatSlasherMask
  name: "маска Слешера"
  description: "Наголовна маска, що повністю захищає власника від дугового ураження очей у відкритому космосі."

- type: entity
  id: CigaretteMedical
  suffix: Medical
  description: "Надабсорбуюча сигарета хімлабораторії, на смак трохи нагадує азбест."
  parent: Cigarette
  name: "сигарета"
  components:
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 10
  - type: RefillableSolution # it would make more sense for all cigerattes to work like this.
    solution: smokable

- type: entity
  id: ECigarette
  description: "Багаторазова електронна сигарета, смакує так, як пахне магічний дим."
  parent: BaseCigar
  name: "електронна сигарета"
  components:
  - type: Cigar
    selfIgniting: true
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 20
  - type: Tag
    tags:
      - Trash
  - type: SpaceGarbage
  - type: Sprite
    sprite: _Goobstation/Objects/Consumable/Smokeables/Cigarettes/ecigarette.rsi
    state: unlit-icon
  - type: Clothing
    sprite: _Goobstation/Objects/Consumable/Smokeables/Cigarettes/ecigarette.rsi
    slots: [ mask ]
    equippedPrefix: unlit
  - type: Item
    size: Tiny
    sprite: _Goobstation/Objects/Consumable/Smokeables/Cigarettes/ecigarette.rsi
    heldPrefix: unlit
  - type: RefillableSolution
    solution: smokable
  - type: DrawableSolution
    solution: smokable

- type: entity
  id: CryostasisCigarette
  description: "Кріостазна електронна сигарета; хімікати всередині капсули не можуть реагувати."
  parent: BaseCigar
  name: "кріостазна сигарета"
  components:
  - type: Cigar
    selfIgniting: true
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 20
        canReact: false
  - type: Tag
    tags:
      - Trash
  - type: SpaceGarbage
  - type: Sprite
    sprite: _Goobstation/Objects/Consumable/Smokeables/Cigarettes/cryostasiscigarette.rsi
    state: unlit-icon
  - type: Clothing
    sprite: _Goobstation/Objects/Consumable/Smokeables/Cigarettes/cryostasiscigarette.rsi
    slots: [ mask ]
    equippedPrefix: unlit
  - type: Item
    size: Tiny
    sprite: _Goobstation/Objects/Consumable/Smokeables/Cigarettes/cryostasiscigarette.rsi
    heldPrefix: unlit
  - type: RefillableSolution
    solution: smokable
  - type: DrawableSolution
    solution: smokable

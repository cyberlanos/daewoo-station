- type: entity
  parent: CardBaseTarot
  categories: [ HideSpawnMenu ]
  id: CardScTwoOfCups
  description: "Два келихи, з кожного здіймається змія. Вони переплітаються й обвивають одна одну. Вода, єдність, партнерство, зв’язок"

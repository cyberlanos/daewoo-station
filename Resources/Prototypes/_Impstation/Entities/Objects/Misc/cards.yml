  components:
  - type: Card
    name: card-sc-four-cups
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_4_of_Cups_tarot

- type: entity
  parent: CardBaseTarot
  categories: [ HideSpawnMenu ]
  id: CardScFiveOfCups
  description: "Крупний план заплаканої постаті. Позаду стоять два келихи, ще три лежать розкидані внизу. Вода, втрата, скорбота, розчарування, жалоба"
  components:
  - type: Card
    name: card-sc-five-cups
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_5_of_Cups_tarot

- type: entity
  parent: CardBaseTarot
  categories: [ HideSpawnMenu ]
  id: CardScSixOfCups
  description: "Два кролики обабіч високої квітки. Навколо них шість келихів, і з кожного проростають квіти. Вода, знайомість, спогади, зцілення, відновлення"

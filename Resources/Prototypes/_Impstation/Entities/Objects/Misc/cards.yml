    name: card-sc-queen-cups
  - type: Sprite
    sprite: EstacaoPirata/Objects/Misc/cards.rsi
    state: sc_Queen_of_Cups_tarot

- type: entity
  parent: CardBaseTarot
  categories: [ HideSpawnMenu ]
  id: CardScKingOfCups

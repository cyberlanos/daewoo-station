- type: polymorph
  id: VampireSanguinePoolPolymorph
  configuration:
    entity: MobVampireSanguinePool
    forced: true
    transferDamage: true
    transferName: true
    # Pirate: Goob polymorph drops gear when Transfer targets a form without inventory slots.
    inventory: None
    revertOnCrit: true
    revertOnDeath: true
    effectProto: null
    polymorphSound: !type:SoundPathSpecifier
      path: /Audio/_Pirate/Effects/vampire/enter_blood.ogg
    exitPolymorphSound: !type:SoundPathSpecifier
      path: /Audio/_Pirate/Effects/vampire/exit_blood.ogg

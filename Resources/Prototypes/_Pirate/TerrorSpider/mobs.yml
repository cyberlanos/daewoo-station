- type: entity
  name: "павук терору"
  parent: [ SimpleMobBase, MobCombat ]
  id: MobTerrorSpider
  description: "смертоносний гібрид гігантського павука та ксеноморфа."
  abstract: true
  components:
  - type: Prying
    pryPowered: false
    force: true
    speedModifier: 1.5
    # Pirate - local Prying has one finish sound; use Starlight's airlock pry sound.
    useSound:
      path: /Audio/_Pirate/Machines/airlock_pry.ogg
  - type: WeaponArcVisuals
  - type: LanguageKnowledge
    speaks:
    - Chittin
    # Pirate - Starlight Xenomind language uses unsupported language-radio fields here; use local xeno language plus collective mind.
    - Xeno
    understands:
    - Chittin
    - Xeno
  - type: CollectiveMind
    defaultChannel: Xenomorphivemind
    channels:
    - Xenomorphivemind
  - type: ThermalVision
    # Pirate - local Goob thermal vision does not support Starlight's alternative screen shader.
  - type: OptionsVisualizer
    visuals:
      base:
      - options: Default
        data:
          drawdepth: Mobs
          sprite: _Pirate/Mobs/Animals/Spiders/terror_red.rsi
          map: [ "enum.DamageStateVisualLayers.Base", "movement" ]
          state: alive
      - options: Arachnophobia
        data:
          drawdepth: Mobs
          sprite: _Pirate/Mobs/Animals/Spiders/Arachnophobia/terror_red.rsi
          map: [ "enum.DamageStateVisualLayers.Base", "movement" ]
          state: alive
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 190
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: DamageStateVisuals
    states:
      Alive:
        Base: alive
      Critical:
        Base: dead
      Dead:
        Base: dead
  - type: Butcherable
    spawned:
    - id: FoodMeatSpider
      amount: 4
  - type: CombatMode
  - type: Body
    prototype: AnimalHemocyanin
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: TerrorSpider
  - type: MobThresholds
    thresholds:
      0: Alive
      160: Dead
  - type: MeleeWeapon
    altDisarm: false
    angle: 0
    animation: WeaponArcBite
    soundHit:
      path: /Audio/Effects/bite.ogg
    damage:
      types:
        Piercing: 18
  - type: SolutionContainerManager
    solutions:
      melee:
        maxVol: 30
  - type: SolutionRegeneration
    solution: melee
    generated:
      reagents:
      - ReagentId: Mechanotoxin
        Quantity: 1
  - type: MeleeChemicalInjector
    transferAmount: 0.75
    solution: melee
  - type: LanguageSpeaker
  - type: NoSlip
  - type: Spider
  - type: IgnoreSpiderWeb
  - type: Bloodstream
    bleedReductionAmount: 1
    bloodRefreshAmount: 3
    # Pirate - local Bloodstream lacks Starlight bloodReferenceSolution.
    bloodReagent: CopperBlood
    bloodMaxVolume: 150
  - type: Speech
    speechVerb: Arachnid
    speechSounds: Arachnid
    allowedEmotes: [ 'Click', 'Chitter', 'Hisses' ]
  - type: Vocal
    sounds:
      Male: UnisexArachnid
      Female: UnisexArachnid
      Unsexed: UnisexArachnid
  - type: TypingIndicator
    proto: spider
  - type: Tag
    tags:
    - DoorBumpOpener
    - FootstepSound
  - type: PassiveDamage
    allowedStates:
    - Alive
    damageCap: 159
    damage:
      types:
        Poison: -0.07
      groups:
        Brute: -0.07
        Burn: -0.07
  - type: NpcFactionMember
    factions:
    - Xeno
  - type: InputMover
  - type: MobMover
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
  - type: GhostRole
    makeSentient: true
    name: ghost-role-terror-spider-name
    description: ghost-role-terror-spider-description
    rules: ghost-role-terror-spider-rules
    raffle:
      settings: short
  - type: GhostTakeoverAvailable
  - type: Puller
    needsHands: false
  # Pirate - rule scoring queries this marker; Starlight defines the component but does not wire it in YAML.
  - type: TerrorSpider
  - type: ActionGrant
    actions:
    - ActionEntityWrap


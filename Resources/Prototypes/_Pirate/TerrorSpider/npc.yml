- type: htnCompound
  id: SimpleWebAvoidanceCompound
  branches:
  - tasks:
    - !type:HTNCompoundTask
      task: MeleeAvoidanceCompound
  - tasks:
    - !type:HTNCompoundTask
      task: WebOrIdleCompound

- type: htnCompound
  id: MeleeAvoidanceCompound
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyMeleeTargets
    - !type:HTNCompoundTask
      task: BeforeMeleeAvoidenceTargetCompound

- type: htnCompound
  id: BeforeMeleeAvoidenceTargetCompound
  branches:
  - preconditions:
    - !type:BuckledPrecondition
      isBuckled: true
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UnbuckleOperator
        shutdownState: TaskFinished

  - preconditions:
    - !type:PulledPrecondition
      isPulled: true
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UnPullOperator
        shutdownState: TaskFinished

  - preconditions:
    - !type:InContainerPrecondition
      isInContainer: true
    tasks:
    - !type:HTNCompoundTask
      task: EscapeCompound

  - tasks:
    - !type:HTNCompoundTask
      task: MeleeAvoidanceTargetCompound

- type: htnCompound
  id: MeleeAvoidanceTargetCompound
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: Target
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:MoveFromOperator
        shutdownState: PlanFinished
        pathfindInPlanning: true
        removeKeyOnFinish: false
        targetKey: TargetCoordinates
        pathfindKey: TargetPathfind
        rangeKey: VisionRadius
        useJump: true
    - !type:HTNPrimitiveTask
      operator: !type:JukeOperator
        jukeType: Away

- type: htnCompound
  id: WebOrIdleCompound
  branches:
  - tasks:
    - !type:HTNCompoundTask
      task: WebIdleCompound

  - tasks:
    - !type:HTNCompoundTask
      task: IdleCompound

- type: htnCompound
  id: WebIdleCompound
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:WaitOperator
        key: IdleTime
      preconditions:
      - !type:KeyExistsPrecondition
        key: IdleTime

  - preconditions:
    - !type:BuckledPrecondition
      isBuckled: false
    - !type:PulledPrecondition
      isPulled: false
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:PickWebTileOperator
        rangeKey: IdleRange
        tileEntityComponent: SpiderWebObject
    - !type:HTNPrimitiveTask
      operator: !type:MoveToOperator
        pathfindInPlanning: false
    - !type:HTNPrimitiveTask
      operator: !type:RandomOperator
        targetKey: IdleTime
        minKey: MinimumIdleTime
        maxKey: MaximumIdleTime
    - !type:HTNPrimitiveTask
      operator: !type:WaitOperator
        key: IdleTime
      preconditions:
      - !type:KeyExistsPrecondition
        key: IdleTime

- type: entity
  id: EffectTerrorCocoon
  categories: [ HideSpawnMenu ]
  # Pirate - local "cocoon" locale id conflicts with prototype localization validation.
  name: "кокон терору"
  description: "Павутинний кокон з людьми всередині!"
  components:
  - type: Clickable
  - type: Transform
    anchored: true
  - type: InteractionOutline
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Sprite
    noRot: true
    drawdepth: BelowMobs
    sprite: /Textures/_Pirate/Effects/cocoon.rsi
    layers:
    - state: large1
  - type: RandomSprite
    available:
    - 0:
        large1: ""
        large2: ""
        large3: ""
  - type: ContainerContainer
    containers:
      entity: !type:Container
  - type: WrapEntityHolder

  - type: SpiderWebObject
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _Pirate/Structures/Specific/TerrorSpiders/buildings.rsi
    drawdepth: OverMobs
    layers:
    - state: ammonia_gen
  - type: Fixtures
    fixtures:
      fix1:

- type: entity
  id: SpiderWebAirtight
  parent: SpiderWebBase
  name: "повітронепроникна павутина"
  description: "Вона волокниста, липка й повітронепроникна."
  components:
  - type: Airtight
    # Pirate - airtight web should seal the room, not vacuum its own tile.
    noAirWhenFullyAirBlocked: false
  - type: ReplaceFloorOnSpawn
    # Pirate - airtight web must create a grid tile before atmos can seal or refill it.
    replaceableTiles:
    - Plating
    - Lattice
    - TrainLattice
    replacementTiles:
    - Plating
    offsets:
    - 0,0
  - type: Sprite
    color: "#ffffffdd"
  - type: Fixtures
    fixtures:
      fix1:
        hard: false
        density: 7
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        layer:
        - MidImpassable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWebSilk:
            min: 1
            max: 3
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.5
    sprintSpeedModifier: 0.5
    ignoreWhitelist:
      components:
      - IgnoreSpiderWeb


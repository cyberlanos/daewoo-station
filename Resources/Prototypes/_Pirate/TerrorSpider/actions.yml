- type: entity
  id: ActionWebball
  name: "Павутинна куля"
  description: "Стріляє павутинною кулею в обрану точку."
  components:
  - type: Action
    useDelay: 30
    itemIconStyle: BigAction
    raiseOnUser: true
    sound:
      path: /Audio/Weapons/Xeno/alien_spitacid.ogg
    icon:
      sprite: _Pirate/Interface/Actions/actions_spider.rsi
      state: web
  - type: TargetAction
    range: 20
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:ProjectileSpellEvent
      prototype: ProjectileWebball

- type: entity
  id: ProjectileWebball
  name: "павутинна куля"
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Blunt: 3
  - type: Sprite
    sprite: _Pirate/Interface/Actions/actions_spider.rsi
    layers:
    - state: web
      shader: unshaded
  - type: SpawnOnCollide
    prototype: SpiderWeb

- type: entity
  id: ActionAcidVent
  name: "Кислотна вентиляція"
  description: "Розварює вентиляційні отвори."
  components:
  - type: Action
    useDelay: 30
    itemIconStyle: BigAction
    raiseOnUser: true
    sound:
      path: /Audio/Effects/pop.ogg
    icon:
      sprite: _Pirate/Interface/Actions/actions_spider.rsi
      state: acid_vent
  - type: TargetAction
    range: 2
    checkCanAccess: true
  - type: EntityTargetAction
    event: !type:AcidVentEvent

- type: entity
  id: ActionTerrorSpiderEvolve
  name: "Еволюціонувати"
  description: "еволюціонувати в нову істоту."
  components:
  - type: Action
    useDelay: 3
    itemIconStyle: BigAction
    sound: /Audio/Effects/pop.ogg
    icon:
      sprite: _Pirate/Interface/Actions/actions_spider.rsi
      state: evolve
  - type: InstantAction
    event: !type:EvolveEvent

- type: entity
  id: ActionSpiderEMPScream
  name: "ЕМІ-крик"
  description: "Випускає ЕМІ-крик, що вимикає електроніку в радіусі."
  components:
  - type: Action
    useDelay: 3
    itemIconStyle: BigAction
    sound: /Audio/Effects/pop.ogg
    icon:
      sprite: _Pirate/Interface/Actions/actions_spider.rsi
      state: spiderscream
  - type: LimitedCharges
    maxCharges: 2
  - type: AutoRecharge
    rechargeDuration: 60
  - type: InstantAction
    event: !type:EMPScreamEvent

- type: entity
  id: ActionEggInjection
  name: "Введення яєць"
  description: "Вводить яйця в тіло."
  components:
  - type: Action
    useDelay: 3
    itemIconStyle: BigAction
    sound: /Audio/Effects/pop.ogg
    icon:
      sprite: _Pirate/Interface/Actions/actions_spider.rsi
      state: lay_eggs
  - type: TargetAction
    interactOnMiss: false
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      components:
      - WrapEntityHolder
    event: !type:EggInjectionEvent

- type: entity
  id: ActionEggsLaying
  name: "Відкласти яйце."
  description: "Відкласти яйце."
  components:
  - type: Action
    itemIconStyle: BigAction
    useDelay: 5
    icon:
      sprite: _Pirate/Interface/Actions/actions_spider.rsi
      state: lay_eggs
  - type: LimitedCharges
    maxCharges: 3
  - type: AutoRecharge
    rechargeDuration: 90
  - type: InstantAction
    event: !type:EggsLayingEvent

- type: entity
  id: ActionRoyalJelly
  name: "Королівське желе"
  description: "відкладає королівське желе, яке можуть їсти павуки, щоб лікуватися."
  components:
  - type: Action
    useDelay: 3
    itemIconStyle: BigAction
    sound: /Audio/Effects/pop.ogg
    icon:
      sprite: _Pirate/Objects/Consumable/Food/spiderjelly.rsi
      state: action
  - type: LimitedCharges
    maxCharges: 3
  - type: AutoRecharge
    rechargeDuration: 90
  - type: InstantAction
    event: !type:SpawnOnActionEvent

- type: entity
  parent: BaseAction
  id: ActionSpiderBuildingPole
  name: "Павутинний стовп"
  description: "Створює павутинний стовп, який породжує павутину навколо на вільних плитках."
  components:
  - type: Action
    icon:
      sprite: _Pirate/Structures/Specific/TerrorSpiders/buildings_48.rsi
      state: pole
    useDelay: 3
  - type: LimitedCharges
    maxCharges: 1
  - type: AutoRecharge
    rechargeDuration: 300
  - type: InstantAction
    event: !type:SpiderWebBuildingActionEvent
      building: WebEntityBeacon

- type: entity
  parent: BaseAction
  id: ActionSpiderBuildingCocoon
  name: "Павутинний кокон"
  description: "Створює павутинний кокон, який лікує павука, що заліз у нього."
  components:
  - type: Action
    icon:
      sprite: _Pirate/Structures/Specific/TerrorSpiders/buildings.rsi
      state: cocoon
    useDelay: 3
  - type: LimitedCharges
    maxCharges: 1
  - type: AutoRecharge
    rechargeDuration: 300
  - type: InstantAction
    event: !type:SpiderWebBuildingActionEvent
      # Pirate - Starlight WebCocoon conflicts with existing _NF handcuffs prototype id.
      building: TerrorWebCocoon

- type: entity
  parent: BaseAction
  id: ActionSpiderBuildingGenerator
  name: "Генератор аміаку"
  description: "Створює генератор аміаку, який наповнює кімнати атмосферою."
  components:
  - type: Action
    icon:
      sprite: _Pirate/Structures/Specific/TerrorSpiders/buildings.rsi
      state: ammonia_gen
    useDelay: 3
  - type: LimitedCharges
    maxCharges: 1
  - type: AutoRecharge
    rechargeDuration: 600
  - type: InstantAction
    event: !type:SpiderWebBuildingActionEvent
      building: AmmoniaEggGenerator

- type: entity
  id: ActionEntityWrap
  name: "Обгорнути"
  description: "Обгорнути ціль павутиною, знерухомивши її."
  components:
  - type: Action
    useDelay: 3
    itemIconStyle: BigAction
    sound: /Audio/Effects/pop.ogg
    icon:
      sprite: _Pirate/Interface/Actions/actions_spider.rsi
      state: wrap
  - type: TargetAction
    interactOnMiss: false
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      components:
      - HumanoidAppearance
    event: !type:WrapActionEvent

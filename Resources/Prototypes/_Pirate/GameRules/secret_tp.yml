- type: entityTable
  id: SecretTPTable
  table: !type:AllSelector
    children:
      - !type:NestedSelector
        tableId: SpaceTrafficControlTable
      - !type:NestedSelector
        tableId: SecretTPGameRulesTable

- type: entityTable
  id: SecretTPGameRulesTable
  table: !type:AllSelector
    children:
      - !type:NestedSelector
        tableId: BasicCalmEventsTable
      - !type:NestedSelector
        tableId: SecretTPAntagEventsTable
      - !type:NestedSelector
        tableId: CargoGiftsTable
      - !type:NestedSelector
        tableId: CalmPestEventsTable
      - !type:NestedSelector
        tableId: SpicyPestEventsTable

- type: entityTable
  id: SecretTPAntagEventsTable
  table: !type:AllSelector
    children:
      - id: ClosetSkeleton
      - id: DragonSpawn
      - id: KingRatMigration
      - id: NinjaSpawn
      - id: SleeperAgents
      - id: DerelictCyborgSpawn
      - id: BingleSpawn
      - id: SlaughterDemonMidround
      - id: SingulothKnightsMidround
      - id: VoxRaidersMidround

- type: weightedRandom
  id: SecretTPPrimary
  weights:
    # Зроблено так, щоб шанс був (2:1:1) 2 на теоритично спокійну зміну; 1 на 50:50; 1 на РДМ.
    # Спокійна
    Traitor: 0.22
    Changeling: 0.12
    Vampire: 0.06
    # 50:50
    Heretic: 0.10
    Revolutionary: 0.10
    # РДМ
    Nukeops: 0.04
    BlobGameMode: 0.04
    Shadowling: 0.04
    XenomorphsInfestationRoundstart: 0.03
    CosmicCult: 0.02
    Zombie: 0.02
    Wizard: 0.01

- type: weightedRandom
  id: SecretTPRoundstart
  weights:
    Traitor: 0.25
    Thief: 0.2
    Devil: 0.1
    Changeling: 0.05
    Heretic: 0.03
    Vampire: 0.03
    CorporateAgent: 0.03

- type: entity
  id: SecretTP
  parent: BaseGameRule
  categories: [ HideSpawnMenu ]
  components:
  - type: SecretPlus
    minStartingChaos: 11
    maxStartingChaos: 22
    livingChaosChange: -0.018
    deadChaosChange: 0.048
    chaosChangeVariationMin: 0.65
    chaosChangeVariationMax: 1.3
    eventIntervalMin: 180
    eventIntervalMax: 450
    primaryAntagsWeightTable: SecretTPPrimary
    roundStartAntagsWeightTable: SecretTPRoundstart
  - type: SelectedGameRules
    scheduledGameRules: !type:NestedSelector
      tableId: SecretTPTable

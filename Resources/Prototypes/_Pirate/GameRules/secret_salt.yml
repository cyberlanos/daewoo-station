- type: entityTable
  id: SecretSaltTable
  table: !type:AllSelector
    children:
    - !type:NestedSelector
      tableId: SpaceTrafficControlTable
    - !type:NestedSelector
      tableId: SecretSaltGameRulesTable

- type: entityTable
  id: SecretSaltGameRulesTable
  table: !type:AllSelector
    children:
    - !type:NestedSelector
      tableId: BasicGameRulesTable
    - !type:NestedSelector
      tableId: SecretSaltAntagEventsTable

- type: entityTable
  id: SecretSaltAntagEventsTable
  table: !type:AllSelector
    children:
    - id: BingleSpawn
    - id: SingulothKnightsMidround
    - id: VoxRaidersMidround
    - id: ContractorSpawnMidround

- type: weightedRandom
  id: SecretSaltRoundstart
  weights:
    # subgamemodes
    Thief: 0.2
    Shadowling: 0.05 # Pirate
    Devil: 0.05 # Pirate

    # normal
    Traitor: 0.18 # Pirate
    Changeling: 0.06 # Pirate
    Heretic: 0.11
    Vampire: 0.04 # Pirate
    CorporateAgent: 0.025
    XenomorphsInfestationRoundstart: 0.02

- type: weightedRandom
  id: SecretSaltPrimary
  weights:
    Traitor: 0.18 # Pirate
    Changeling: 0.06 # Pirate
    Heretic: 0.11
    Vampire: 0.04 # Pirate
    Nukeops: 0.07 # Pirate
    Revolutionary: 0.10 # Pirate
    Zombie: 0.05 # Pirate
    BlobGameMode: 0.05
    Wizard: 0.04 # Pirate
    CosmicCult: 0.03 # Pirate
    CorporateAgent: 0.025
    XenomorphsInfestationRoundstart: 0.04
    OopsAllThieves: 0.02
    Shadowling: 0.04

- type: weightedRandom
  id: SecretSaltChaos
  weights:
    Thief: 0.2
    Shadowling: 0.05 # Pirate
    Devil: 0.05 # Pirate
    Traitor: 0.18 # Pirate
    Changeling: 0.06 # Pirate
    Heretic: 0.11
    Vampire: 0.04 # Pirate
    Nukeops: 0.07 # Pirate
    Revolutionary: 0.07 # Pirate
    Zombie: 0.05 # Pirate
    BlobGameMode: 0.05
    Wizard: 0.03 # Pirate
    CosmicCult: 0.03 # Pirate
    CorporateAgent: 0.025
    XenomorphsInfestationRoundstart: 0.02

- type: entity
  id: SecretSalt
  parent: BaseGameRule
  categories: [ HideSpawnMenu ]
  components:
  - type: SecretPlus
    minStartingChaos: 11
    maxStartingChaos: 22
    livingChaosChange: -0.018
    deadChaosChange: 0.048
    chaosChangeVariationMin: 0.65
    chaosChangeVariationMax: 1.3
    eventIntervalMin: 180
    eventIntervalMax: 450
    primaryAntagsWeightTable: SecretSaltPrimary
    roundStartAntagsWeightTable: SecretSaltRoundstart
  - type: SelectedGameRules
    scheduledGameRules: !type:NestedSelector
      tableId: SecretSaltTable

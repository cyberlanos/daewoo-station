      completed:
      - !type:GivePrototype
        prototype: CableApcStack1
        amount: 5
      - !type:GivePrototype
        prototype: CableMVStack1
        amount: 5
      - !type:GivePrototype
        prototype: CableHVStack1
        amount: 5
      - !type:DeleteEntity
      steps:
      - tool: Cutting
        doAfter: 1

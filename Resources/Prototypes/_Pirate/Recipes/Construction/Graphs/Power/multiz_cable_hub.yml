    edges:
    - to: hub
      steps:
      - material: Cable
        amount: 5
        doAfter: 1
      - material: CableMV
        amount: 5
        doAfter: 1
      - material: CableHV
        amount: 5
        doAfter: 1

  - node: hub
    entity: CEMultizCableHub

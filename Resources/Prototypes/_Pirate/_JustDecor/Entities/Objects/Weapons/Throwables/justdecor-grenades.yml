- type: entity
  parent: SmokeGrenade
  id: SmokeGrenadeLove
  name: "граната кохання"
  description: "Граната, що випускає хмару диму, яка викликає почуття закоханості. Поширює тепло й прихильність."
  components:
  - type: Sprite
    sprite: Objects/Weapons/Grenades/smoke.rsi
    color: "#FF6FA3"
  - type: SmokeOnTrigger
    duration: 20
    spreadAmount: 40
    solution:
      reagents:
      - ReagentId: WitchLove
        Quantity: 25


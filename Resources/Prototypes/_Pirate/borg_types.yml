# Pirate: ported from https://github.com/lagrange14/substations/pull/560

# Salvage quadborg
- type: borgType
  id: quadmining
  dummyPrototype: QuadChassisMining
  extraModuleCount: 3
  moduleWhitelist:
    tags:
    - BorgModuleGeneric
    - BorgModuleCargo
  defaultModules:
  - BorgModuleTool
  - BorgModuleMining
  - BorgModuleTraversal
  - BorgModuleAppraisal
  - BorgModulePKA # Goobstation
  lawset: Salvage
  radioChannels:
  - Supply
  - Science
  addComponents:
  - type: NoWieldNeeded
  - type: SlavedBorg # Goobstation: keep salvage borg AI labeling parity.
    law: ObeyAI
  - type: Crawler
  inventoryTemplateId: borgShort
  spriteBodyState: quadsalv
  spriteBodyMovementState: quadsalv_m
  spriteHasMindState: quadsalv_e_r
  spriteNoMindState: quadsalv_e_r
  spriteToggleLightState: quadsalv_l
  spriteScale: 0.7, 0.7
  petSuccessString: petting-success-salvage-cyborg
  petFailureString: petting-failure-salvage-cyborg

# Medical quadborg
- type: borgType
  id: quadmedical
  dummyPrototype: QuadChassisMedical
  extraModuleCount: 3
  moduleWhitelist:
    tags:
    - BorgModuleGeneric
    - BorgModuleMedical
  defaultModules:
  - BorgModuleTool
  - BorgModuleChemical
  - BorgModuleTopicals
  - BorgModuleRescue
  - BorgModuleSurgery
  - BorgModuleLollypop # Goobstation
  lawset: Medical
  radioChannels:
  - Science
  - Medical
  addComponents:
  - type: SolutionScanner
  - type: ShowHealthBars
    damageContainers:
    - Biological
  - type: ShowHealthIcons
    damageContainers:
    - Biological
  - type: Sanitized # Shitmed
  - type: SurgeryTarget # Shitmed
  - type: SurgeryIgnoreClothing
  - type: SurgerySpeedModifier
    speedModifier: 1.5
  - type: Crawler
  inventoryTemplateId: borgShort
  spriteBodyState: quadmed
  spriteBodyMovementState: quadmed_m
  spriteHasMindState: quadmed_e_r
  spriteNoMindState: quadmed_e_r
  spriteToggleLightState: quadmed_l
  spriteScale: 0.7, 0.7
  petSuccessString: petting-success-medical-cyborg
  petFailureString: petting-failure-medical-cyborg

# Service quadborg
- type: borgType
  id: quadservice
  dummyPrototype: QuadChassisService
  extraModuleCount: 3
  moduleWhitelist:

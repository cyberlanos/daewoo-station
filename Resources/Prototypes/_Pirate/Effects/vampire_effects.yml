- type: entity
  id: VampireBloodBarrier
  name: "кривавий бар'єр"
  description: "Бар'єр із застиглої крові, що блокує рух."
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: /Textures/_Pirate/Vampire/Effects.rsi
      state: blood_barrier_ent
      drawdepth: Walls
    - type: Physics
      bodyType: Static
    - type: Fixtures
      fixtures:
        fix1:
          shape: !type:PhysShapeAabb
            bounds: "-0.5,-0.5,0.5,0.5"
          mask:
            - FullTileMask
          layer:
            - WallLayer
    - type: Damageable
      damageContainer: Biological
    - type: Destructible
      thresholds:
      - trigger: !type:DamageTrigger
          damage: 130
        behaviors:
        - !type:SpawnEntitiesBehavior
          spawn:
            PuddleBlood:
              min: 1
              max: 1
        - !type:DoActsBehavior
          acts: ["Destruction"]
        - !type:PlaySoundBehavior
          sound:
            collection: WindowShatter
    - type: TimedDespawn
      lifetime: 30.0
    - type: Tag
      tags:
        - Wall


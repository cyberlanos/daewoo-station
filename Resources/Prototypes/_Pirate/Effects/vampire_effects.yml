# Shadow Snare trap for Umbrae vampires
- type: entity
  id: VampireShadowSnare
  name: "тіньова пастка"
  description: "Майже невидима пастка зі згущених тіней."
  categories: [HideSpawnMenu]
  components:
    - type: Damageable
      damageContainer: ShadowHaze
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 1
          behaviors:
            - !type:DoActsBehavior
              acts: ["Destruction"]
    - type: DamagedByFlashing
      flashDamage:
        types:
          Heat: 10
    - type: Transform
      anchored: true
    - type: Sprite
      sprite: /Textures/_Pirate/Vampire/Effects.rsi
      state: shadow_snare_base
      drawdepth: Effects
    - type: Physics
      bodyType: Static
    - type: Fixtures
      fixtures:
        fix1:
          shape: !type:PhysShapeAabb
            bounds: "-0.3,-0.3,0.3,0.3"
          hard: false
          layer:
            - LowImpassable
    - type: Stealth
      minVisibility: -1
      lastVisibility: -1
    - type: StepTrigger
      requiredTriggeredSpeed: -1
    - type: ShadowSnare
      damage:
        types:
          Blunt: 20
    - type: Clickable

# Ensnare entity spawned when shadow snare triggers
- type: entity
  id: VampireShadowSnareEnsnare
  name: "тіньові щупальця"
  description: "Темні щупальця, що зв'язують твої ноги."
  categories: [HideSpawnMenu]
  components:
    - type: Ensnaring
      freeTime: 3.0
      breakoutTime: 8.0
      walkSpeed: 0.1
      sprintSpeed: 0.1
      staminaDamage: 0
      canMoveBreakout: true

# Pirate: ported from https://github.com/lagrange14/substations/pull/560

- type: entity
  id: QuadChassisMining
  parent: BorgChassisSelectable
  name: "шахтарський квадрокіборг"
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Pirate/Mobs/Silicon/chassis.rsi
    scale: 0.7, 0.7
    noRot: true
    layers:
    - state: quadsalv
      map: [ "enum.BorgVisualLayers.Body", "movement" ]
    - state: quadsalv_e_r
      map: [ "enum.BorgVisualLayers.Light" ]
      shader: unshaded
      visible: false
    - state: quadsalv_l
      map: [ "light", "enum.BorgVisualLayers.LightStatus" ]
      shader: unshaded
      visible: false
  - type: BorgSwitchableType
    selectedBorgType: quadmining
  - type: BorgSwitchableSubtype
    borgSubtype: quadmining_default


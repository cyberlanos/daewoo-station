- type: entity
  id: CEZLevelsStairsWoodenBase
  abstract: true
  name: wooden stairs
  components:
  - type: Sprite
    sprite: _Pirate/Structures/Architecture/Ladders/wooden.rsi
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank1:
            min: 1
            max: 2
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent:
  - CEZLevelStairsBase
  - CEZLevelsStairsWoodenBase
  id: CEZLevelStairsWooden
  components:
  - type: Construction
    graph: CEZLevelStairsWooden
    node: CEZLevelStairsWooden

- type: entity
  parent:
  - CEZLevelStairsCornerBase
  - CEZLevelsStairsWoodenBase
  id: CEZLevelStairsWoodenCorner
  suffix: Corner
  components:
  - type: Construction
    graph: CEZLevelStairsWooden
    node: CEZLevelStairsWoodenCorner

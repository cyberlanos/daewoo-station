- type: entity
  id: CEZLevelsLadderDirtCliffBase
  abstract: true
  name: dirt cliff
  description: A rough dirt cliff face that can be climbed between z-levels.
  components:
  - type: Sprite
    sprite: _Pirate/Structures/Architecture/Ladders/dirt_cliff.rsi
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Rock
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/break_stone.ogg
          params:
            volume: -6
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent:
  - CEZLevelLadderBase
  - CEZLevelsLadderDirtCliffBase
  id: CEZLevelLadderDirtCliff

- type: entity
  parent:
  - CEZLevelLadderCornerBase
  - CEZLevelsLadderDirtCliffBase
  id: CEZLevelLadderDirtCliffCorner
  suffix: Corner

- type: entity
  parent:
  - CEZLevelLadderCornerInnerBase
  - CEZLevelsLadderDirtCliffBase
  id: CEZLevelLadderDirtCliffCornerInner
  suffix: Inner Corner

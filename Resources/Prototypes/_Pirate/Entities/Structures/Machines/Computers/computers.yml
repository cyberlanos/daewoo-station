- type: entity
  parent: [ComputerComms, SolAllianceInfo]
  id: SANComputerComms
  name: "консоль зв’язку соляріанського флоту"
  suffix: SAN
  description: "Використання її для оголошення сповістить станцію або ваших ворогів про вашу присутність."
  components:
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: comm_SAN
    - map: ["computerLayerKeys"]
      state: generic_keys
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: AccessReader
    access: [[ "SAN" ]]
  - type: CommunicationsConsole
    title: comms-console-announcement-title-SAN
    color: "#3c5eb5"
    canShuttle: false
    global: true
    announceSentBy: false
    sound: /Audio/_Pirate/Announcements/sol_announce.ogg

  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#3c5eb5"

- type: entity
  parent: BaseComputerAiAccess
  id: MassDriverComputer
  name: "комп’ютер мас-драйвера"
  description: "Комп’ютер для керування мас-драйверами."
  components:
  - type: MassDriverConsole
  - type: ActivatableUI
    key: enum.MassDriverConsoleUiKey.Key
  - type: UserInterface
    interfaces:
      enum.MassDriverConsoleUiKey.Key:
        type: MassDriverConsoleBoundUserInterface
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface
  - type: Sprite
    layers:
    - map: [ "computerLayerBody" ]
      state: computer
    - map: [ "computerLayerKeyboard" ]
      state: generic_keyboard
    - map: [ "computerLayerScreen" ]
      state: sensors
    - map: [ "computerLayerKeys" ]
      state: generic_keys
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: Computer
    board: MassDriverComputerCircuitboard
  - type: PointLight
    radius: 2.5
    energy: 1.5
    color: "#2e9ec9"
    castShadows: false
  - type: DeviceList
  - type: DeviceNetwork
    deviceNetId: Wired
  - type: DeviceLinkSource
    range: 50
    ports:
    - MassDriverConsoleSender
  - type: ItemSlots
  - type: ContainerContainer
    containers:
      board: !type:Container

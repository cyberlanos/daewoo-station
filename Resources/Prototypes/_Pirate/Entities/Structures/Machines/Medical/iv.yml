- type: entity
  parent: BaseStructureDynamic
  id: IVDrip
  name: IV drip
  description: Allows you to inject blood into a patient or extract blood from them for a transfusion.
  suffix: Empty
  components:
  - type: Transform
    anchored: false
    noRot: true
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 60
        mask:
        - MobMask
  - type: Sprite
    noRot: true
    sprite: _Pirate/Structures/Machines/Medical/iv_drip.rsi
    layers:
    - state: unhooked
      map: [ "enum.IVDripVisualLayers.Base" ]
    - state: reagent0
      map: [ "enum.IVDripVisualLayers.Reagent" ]
  - type: IVDrip
    reagentStates:
    - 0: reagent0
    - 10: reagent10
    - 25: reagent25
    - 50: reagent50
    - 75: reagent75
    - 80: reagent80
    - 100: reagent100
    ripDamage:
      types:
        Piercing: 3
  - type: ItemSlots
    slots:
      pack:
        name: pack
        whitelist:
          components:
          - BloodPack
  - type: ContainerContainer
    containers:
      pack: !type:ContainerSlot {}

- type: entity
  parent: BaseItem
  id: IVBloodPack
  name: IV blood pack
  description: A blood pack for transfusions through an IV drip.
  suffix: Empty
  components:
  - type: BloodPack
    ripDamage:
      types:
        Piercing: 3
  - type: Sprite
    sprite: _Pirate/Objects/Medical/blood_pack.rsi
    layers:
    - state: bloodpack1
      map: [ "enum.BloodPackVisuals.Fill" ]
      visible: false
    - state: bloodpack
    - state: blank
      map: [ "enum.BloodPackVisuals.Label" ]
  - type: Item
    size: Small
    sprite: _Pirate/Objects/Medical/blood_pack.rsi
  - type: SolutionContainerManager
    solutions:
      pack:
        maxVol: 300
  - type: SolutionTransfer
    canChangeTransferAmount: true
  - type: Appearance
  - type: DrawableSolution
    solution: pack
  - type: InjectableSolution
    solution: pack
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Glass
  - type: DamageOnHighSpeedImpact
    minimumSpeed: 2
    damage:
      types:
        Blunt: 5
  - type: StaticPrice
    price: 30
  - type: Clothing
    quickEquip: false
    slots:
    - suitstorage
  - type: PhysicalComposition
    materialComposition:
      Plastic: 500

- type: entity
  parent: IVBloodPack
  id: IVBloodPackFull
  name: IV blood pack
  suffix: Full
  components:
  - type: SolutionContainerManager
    solutions:
      pack:
        maxVol: 300
        reagents:
        - ReagentId: Blood
          Quantity: 300

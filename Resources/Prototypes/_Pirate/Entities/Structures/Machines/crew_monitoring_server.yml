# This was peeled off of upstream's `ResearchAndDevelopmentServer`. Changes to that prototype from upstream should be
# carefully considered to be added here or there, depending on whether it should affect just the machine variant, or all
# variants of the crewmon server.
- type: entity
  id: PirateBaseCrewMonitoringServer
  abstract: true
  name: "абстрактний сервер моніторингу екіпажу"
  description: "Отримує та ретранслює стан усіх активних датчиків костюмів на станції."
  components:
  - type: CrewMonitoringServer
  - type: SingletonDeviceNetServer
  - type: DeviceNetwork
    deviceNetId: Wireless
    transmitFrequencyId: CrewMonitor
    receiveFrequencyId: SuitSensor
    autoConnect: false
  - type: WirelessNetworkConnection
    range: 500 # Pirate: preserve local station-limited crew monitor behavior.
  - type: StationLimitedNetwork
  - type: ApcPowerReceiver
    powerLoad: 200
  - type: ExtensionCableReceiver
  - type: WiresPanel
  - type: WiresVisuals
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: GuideHelp
    guides:
    - Medical

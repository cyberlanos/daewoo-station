# starcup - Emergency Comfort Deployment Units adapted from The Den.

- type: entity
  parent: BaseItem
  id: PillowBaseWrapped
  name: "загорнута подушка"
  description: "Екстрений блок розгортання комфорту, призначений для випадку кризи затишку. Обгорніть подушку пластиковими листами, щоб зберегти її чистою до потреби."
  components:
  - type: Sprite
    sprite: /Textures/_pirate/Structures/Furniture/pillows.rsi
    state: base-wrapped
  - type: Item
    size: Normal
  - type: SpawnItemsOnUse
    items:
    - id: PillowBaseUnwrapped
    sound:
      path: /Audio/Misc/zip.ogg
  - type: Construction
    graph: Pillow
    node: pillowbasewrapped

- type: entity
  parent: SeatBase
  id: PillowBaseUnwrapped
  name: "подушка"
  description: "Екстрений блок розгортання комфорту, оптимізований для максимальної пухнастості в умовах нульової гравітації."
  components:
  - type: Sprite
    sprite: /Textures/_pirate/Structures/Furniture/pillows.rsi
    state: base-unwrapped
  - type: Construction
    graph: Pillow
    node: pillowbaseunwrapped

- type: entity
  parent: PillowBaseWrapped
  id: PillowCommandWrapped
  name: "загорнута командна подушка"
  description: "Містить м’яку оксамитову подушку, ідеальну для відпочинку голів, утомлених тягарем влади. Розгортати за потреби."

    sound:
      path: /Audio/Misc/zip.ogg
  - type: Construction
    graph: Pillow
    node: pillowcommandwrapped

- type: entity
  parent: PillowBaseUnwrapped
  id: PillowCommandUnwrapped
  name: "командна подушка"
  description: "М’яка оксамитова подушка, ідеальна для відпочинку голів, утомлених тягарем влади, у рідкісні моменти, коли Рено ще не спить на ній."
  components:

# starcup - Emergency Comfort Deployment Units adapted from The Den.

- type: entity
  parent: BaseItem
  id: PillowBaseWrapped
  name: wrapped pillow
  description: The Emergency Deployment Comfort Unit, to be deployed in case of comfort crisis. Use plastic sheets to wrap the pillow and keep it clean until needed.
  components:
  - type: Sprite
    sprite: /Textures/_pirate/Structures/Furniture/pillows.rsi
    state: base-wrapped
  - type: Item
    size: Normal
  - type: SpawnItemsOnUse
    items:
    - id: PillowBaseUnwrapped
    sound:
      path: /Audio/Misc/zip.ogg
  - type: Construction
    graph: Pillow
    node: pillowbasewrapped

- type: entity
  parent: SeatBase
  id: PillowBaseUnwrapped
  name: pillow
  description: The Emergency Deployment Comfort Unit, optimized for maximum fluffiness in conditions of zero-gravity.
  components:
  - type: Sprite
    sprite: /Textures/_pirate/Structures/Furniture/pillows.rsi
    state: base-unwrapped
  - type: Construction
    graph: Pillow
    node: pillowbaseunwrapped

- type: entity

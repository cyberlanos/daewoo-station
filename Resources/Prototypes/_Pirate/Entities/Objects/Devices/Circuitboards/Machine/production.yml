- type: entity
  id: PrinterDocMachineCircuitboard
  parent: BaseMachineCircuitboard
  name: document printer machine board
  description: A machine printed circuit board for a document printer
  components:
    - type: MachineBoard
      prototype: PrinterDoc
      stackRequirements:
        Steel: 3
        Manipulator: 1
        Glass: 1

- type: entity
  id: MassDriverCircuitboard
  parent: BaseMachineCircuitboard
  name: mass driver board
  components:
  - type: MachineBoard
    prototype: MassDriver
    stackRequirements:
      Steel: 5
      Manipulator: 2
      Cable: 4

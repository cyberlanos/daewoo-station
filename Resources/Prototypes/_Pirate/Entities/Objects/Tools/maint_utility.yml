- type: entity
  parent: BaseItem
  id: ESDoorJammer
  name: "заклинювач дверей"
  description: "Нашвидкуруч перероблена викрутка, здатна заблокувати будь-який шлюз, у який її кинуть."
  suffix: ES
  components:
  - type: PirateDoorJammer
  - type: Sprite
    sprite: _Pirate/Objects/Tools/door_jammer.rsi
    state: icon
  - type: Item
    size: Small
    sprite: _Pirate/Objects/Tools/door_jammer.rsi
    storedRotation: -90
    storedSprite:
      state: storage
      sprite: _Pirate/Objects/Tools/door_jammer.rsi
  - type: Tool
    qualities:
    - Screwing
    useSound:
      collection: Screwdriver
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/star_hit.ogg
    offset: 0.05,0.0
    removalTime: 4
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 12
  - type: ThrowingAngle
    angle: 315
  - type: LandAtCursor
  - type: MeleeWeapon
    wideAnimationRotation: -45
    wideAnimation: WeaponArcThrust
    attackRate: 1
    damage:
      types:
        Piercing: 6
    soundHit:
      path: "/Audio/Weapons/bladeslice.ogg"

- type: entity
  parent: BaseItem
  id: ESNet
  name: "сітка"
  description: "Однаково корисна для космічної риболовлі та вихоплення предметів із зайнятих рук простим кидком. Дивовижно корисна, навіть якщо її так само легко схопити в повітрі."
  suffix: ES
  components:
  - type: PirateNet
    sound: /Audio/Effects/thudswoosh.ogg
  - type: Sprite
    sprite: _Pirate/Objects/Tools/net.rsi
    state: icon
    drawdepth: BelowMobs
  - type: Item
    size: Normal
    sprite: _Pirate/Objects/Tools/net.rsi
  - type: LandAtCursor
  - type: Catchable
  - type: Transform
    noRot: true

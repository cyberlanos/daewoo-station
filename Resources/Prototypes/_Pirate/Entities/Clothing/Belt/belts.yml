- type: entity
  abstract: true
  parent: ClothingBeltStorageBase
  id: ClothingBeltCombatSurgeryBase
  name: Компактний військовий набір хірургії
  description: Набір вміщуючи у собі все необхідне для праці парамедика та санітара. Не всі оцінили те що він працює тільки з курткою фронтіру, тому нова ревізія дозволяє закріпити його на пояс.
  components:
  - type: Storage
    whitelist:
      tags:
        - Bottle
        - Spray
        - Brutepack
        - Bloodpack
        - Gauze
        - Ointment

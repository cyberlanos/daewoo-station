  components:
  - type: Sprite
    sprite: _Pirate/Clothing/Belt/Captain_sheaths/heavy.rsi
    state: sheath
  - type: Clothing
    sprite: _Pirate/Clothing/Belt/Captain_sheaths/heavy.rsi
  - type: ItemSlots
    slots:
      item:
        name: Sabre
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb

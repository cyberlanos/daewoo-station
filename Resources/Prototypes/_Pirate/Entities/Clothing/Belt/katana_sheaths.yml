- type: entity
  abstract: true
  parent: [ ClothingBeltBase, ClothingSlotBase, BaseMajorContraband ]
  id: ClothingBeltKatanaSheathBase
  name: crimson sheath
  description: A sheath that houses the nimble katana.
  components:
  - type: Item
    size: Ginormous
  - type: ItemSlots
    slots:
      item:
        name: katana-sheath-slot-name
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
  - type: KatanaSheath
  - type: SheathPreservesEnergy
  - type: Appearance

- type: entity
  abstract: true
  parent: [ ClothingBeltBase, ClothingSlotBase, BaseMajorContraband ]
  id: ClothingBeltEnergyKatanaSheathBase
  name: energy katana sheath
  description: A high tech katana sheath that allows for quick blade movements.
  components:
  - type: Item
    size: Ginormous
  - type: ItemSlots
    slots:
      item:
        name: katana-sheath-slot-name
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
  - type: SheathPreservesEnergy
  - type: Appearance

- type: entity
  parent: ClothingBeltKatanaSheathBase
  id: ClothingBeltKatanaSheath
  components:
  - type: Sprite
    sprite: _Pirate/Clothing/Belt/katana_sheath.rsi
    state: sheath
  - type: Clothing
    sprite: _Pirate/Clothing/Belt/katana_sheath.rsi
    slots: [belt, back]
  - type: ItemSlots
    slots:
      item:
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        whitelist:
          tags:
          - KatanaSheathable
  - type: Construction
    graph: ClothingBeltKatanaSheath
    node: sheath

- type: entity
  parent: ClothingBeltKatanaSheath
  id: ClothingBeltKatanaSheathFilled
  suffix: Filled
  components:
  - type: ContainerFill
    containers:
      item:
      - Uchigatana

- type: entity
  parent: ClothingBeltKatanaSheathBase
  id: ClothingBeltDarkKatanaSheath
  name: dark sheath
  description: A plain black sheath built for a quick, silent draw.
  components:
  - type: Sprite
    sprite: _Pirate/Clothing/Belt/dark_sheath.rsi
    state: sheath
  - type: Clothing
    sprite: _Pirate/Clothing/Belt/dark_sheath.rsi
    slots: [belt, back]
  - type: ItemSlots
    slots:
      item:
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        whitelist:
          tags:
          - KatanaSheathable
  - type: Construction
    graph: ClothingBeltDarkKatanaSheath
    node: sheath

- type: entity
  parent: ClothingBeltDarkKatanaSheath
  id: ClothingBeltDarkKatanaSheathKatanaFilled
  suffix: Filled - Katana
  components:
  - type: ContainerFill
    containers:
      item:
      - Katana

- type: entity
  parent: ClothingBeltDarkKatanaSheath
  id: ClothingBeltDarkKatanaSheathUchigatanaFilled
  suffix: Filled - Uchigatana
  components:
  - type: ContainerFill
    containers:
      item:
      - Uchigatana

- type: entity
  parent: ClothingBeltEnergyKatanaSheathBase
  id: ClothingBeltEnergyKatanaSheath
  components:
  - type: Sprite
    sprite: _Pirate/Clothing/Belt/energy_katana_sheath.rsi
    state: sheath
  - type: Clothing
    sprite: _Pirate/Clothing/Belt/energy_katana_sheath.rsi
    slots: [belt]
  - type: ItemSlots
    slots:
      item:
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        whitelist:
          components:
          - EnergyKatana
  - type: ItemMapper
    mapLayers:
      sheath-katana:
        whitelist:
          components:
          - EnergyKatana
  - type: ItemMapperClothingVisualizer

- type: entity
  parent: ClothingBeltEnergyKatanaSheath
  id: ClothingBeltEnergyKatanaSheathFilled
  suffix: Filled
  components:
  - type: ContainerFill
    containers:
      item:
      - EnergyKatana

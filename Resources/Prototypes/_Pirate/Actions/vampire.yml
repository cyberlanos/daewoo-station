- type: entity
  parent: BaseAction
  id: ActionVampireRejuvenateII
  name: Rejuvenate(Free)
  description: Remove stuns and knockdown, reset stamina, purge up to 10u of poisons, then heal 20 brute, 20 burn, 20 poison, and 25 asphyxiation over time.

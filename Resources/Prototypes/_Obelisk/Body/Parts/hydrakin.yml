- type: entity
  id: PartHydrakin
  parent: [BaseItem, BasePart]
  name: "частина тіла гідракіна"
  abstract: true
  components:
  - type: Icon # Shitmed Change
    sprite: _Obelisk/Mobs/Species/Hydrakin/parts.rsi
  - type: Sprite
    sprite: _Obelisk/Mobs/Species/Hydrakin/parts.rsi
  - type: BodyPart # Shitmed Change
    species: Hydrakin
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: AmmoniaBlood
        Quantity: 10


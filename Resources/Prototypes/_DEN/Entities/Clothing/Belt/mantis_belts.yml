- type: entity
  parent: ClothingBeltMantis
  id: ClothingBeltMantisOrnate
  name: "оздоблений пояс Мантіса"
  description: "Товста стрічка, застібнута електрумовим ланцюгом, із внутрішніми кишенями для спорядження Мантіса. Має піхви для певної зброї."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Belt/mantis_belt_ornate.rsi
  - type: Clothing
    sprite: _DEN/Clothing/Belt/mantis_belt_ornate.rsi

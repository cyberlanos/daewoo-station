- type: entity
  parent: [ClothingBeltMantis, BaseFoldable]
  id: ClothingBeltMantisAiry
  name: "легкий пояс Мантіса"
  description: "Тонко сплетений мотузяний пояс із петлями для спорядження Мантіса. Вільний кінець можна заправити, якщо вам до вподоби чисті лінії. Має піхви для певної зброї."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Belt/mantis_belt_airy.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-folded
      map: ["foldedLayer"]
      visible: false
  - type: Clothing
    sprite: _DEN/Clothing/Belt/mantis_belt_airy.rsi
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-verb
    unfoldVerbText: unfold-verb
  - type: FoldableClothing
    foldedEquippedPrefix: folded



- type: entity
  parent: [ClothingHeadHatFezMantis, BaseFoldable]
  id: ClothingHeadHatFezMantisInsulative
  name: "ізоляційна феска Мантіса"
  description: "Хтось обгорнув вашу стару феску Мантіса фольгою з мю-металу... Ну що ж. Принаймні вона захистить від псіонічних атак. М’яку верхівку можна загнути на будь-який бік."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Head/Hats/mantis_fez_insulative.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-flipped
      map: ["foldedLayer"]
      visible: false
  - type: Clothing
    sprite: _DEN/Clothing/Head/Hats/mantis_fez_insulative.rsi
  #- type: GuideHelp
  #  guides: [ PsionicInsulation ]
  - type: Tag
    tags:
    - WhitelistChameleon
    - MantisBeltStorable
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-flip-verb
    unfoldVerbText: fold-flip-verb
  - type: FoldableClothing
    foldedEquippedPrefix: flipped


- type: entity
  parent: [ClothingHeadHatFezMantis, BaseFoldable]
  id: ClothingHeadHatFezMantisAiry
  name: "легка феска Мантіса"
  description: "Скромна шапочка, прикрашена товстою китицею, яку можна носити над будь-яким оком. Але над оком її носити обов’язково, як велить традиція."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Head/Hats/mantis_fez_airy.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-flipped
      map: ["foldedLayer"]
      visible: false
  - type: Clothing
    sprite: _DEN/Clothing/Head/Hats/mantis_fez_airy.rsi
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-flip-verb
    unfoldVerbText: fold-flip-verb
  - type: FoldableClothing
    foldedEquippedPrefix: flipped


- type: entity
  parent: [ClothingHeadHatFezMantis, BaseFoldable]
  id: ClothingHeadHatFezMantisOrnate
  name: "оздоблена феска Мантіса"
  description: "Жорстка шапочка з вуаллю на ланцюжку, яку можна скласти вгору й прибрати з дороги, якщо у вас немає смаку. Або, можливо, очі вже прикриває щось інше? Ви певні, що все гаразд."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Head/Hats/mantis_fez_ornate.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-folded
      map: ["foldedLayer"]
      visible: false
  - type: Clothing
    sprite: _DEN/Clothing/Head/Hats/mantis_fez_ornate.rsi
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-verb
    unfoldVerbText: unfold-verb
  - type: FoldableClothing
    foldedEquippedPrefix: folded


- type: entity # So chameleon clothes can select the folded sprite
  parent: ClothingHeadHatFezMantisOrnate
  id: ClothingHeadHatFezMantisOrnateFolded
  suffix: Folded
  components:
  - type: Foldable
    folded: true
  - type: Clothing
    equippedPrefix: folded


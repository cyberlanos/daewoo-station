- type: entity
  parent: [ClothingUniformJumpsuitMantis, BaseFoldable]
  id: ClothingUniformJumpsuitMantisDark
  name: "темна роба Мантіса"
  description: "Похмура роба зі спадаючими штанами та оком, нанесеним на спині. Вирізи на стегнах можна скласти й закрити, якщо почуваєтеся надто відкрито."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Uniforms/Jumpsuit/mantis_dark.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-folded
      map: ["foldedLayer"]
      visible: false
  - type: Clothing
    sprite: _DEN/Clothing/Uniforms/Jumpsuit/mantis_dark.rsi
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-verb
    unfoldVerbText: unfold-verb
  - type: FoldableClothing
    foldedEquippedPrefix: folded


- type: entity
  parent: [ClothingUniformJumpsuitMantis, BaseFoldable]
  id: ClothingUniformJumpsuitMantisLoincloth # This is ThatKidConnor's fault, but if you try to take it from me I'll kill us all.
  name: "набедрена пов’язка Мантіса"
  description: "Наче уніформа Мантіса й так була недостатньо відвертою. Та все ж є щось особливе в боротьбі з потойбічними загрозами лише в трьох смужках тканини. Верх можна прибрати, якщо справді дуже цього хочеться."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Uniforms/Jumpsuit/mantis_loincloth.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-folded
      map: ["foldedLayer"]
      visible: false
  - type: Clothing
    sprite: _DEN/Clothing/Uniforms/Jumpsuit/mantis_loincloth.rsi
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-verb
    unfoldVerbText: unfold-verb
  - type: FoldableClothing
    foldedEquippedPrefix: folded


- type: entity # So chameleon clothes can select the folded sprite
  parent: ClothingUniformJumpsuitMantisLoincloth
  id: ClothingUniformJumpsuitMantisLoinclothFolded
  suffix: No Bra
  components:
  - type: Foldable
    folded: true
  - type: Clothing
    equippedPrefix: folded

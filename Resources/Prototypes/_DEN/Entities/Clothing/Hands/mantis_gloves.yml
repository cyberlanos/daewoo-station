- type: entity
  parent: ClothingHandsBase
  id: ClothingHandsGlovesMantis
  name: "старомодні рукавички Мантіса"
  description: "Зроблені з міцної тканини та без пальців для спритності. Це все, за що компанія платила до оновлення спорядження Мантіса."
  components:
  - type: Appearance
  - type: Sprite
    sprite: _DEN/Clothing/Hands/Gloves/mantis_gloves.rsi
  - type: Clothing
    sprite: _DEN/Clothing/Hands/Gloves/mantis_gloves.rsi
  - type: Fiber
    fiberColor: fibers-white
  - type: Tag # TheDen
    tags:
    - WhitelistChameleon
    - MantisBeltStorable


- type: entity
  parent: [ClothingHandsGlovesMantis, BaseFoldable]
  id: ClothingHandsGlovesMantisAiry
  name: "легкі рукави Мантіса"
  description: "Рукави з широкими манжетами поверх рукавичок з петлями для пальців. Ліву манжету можна затягнути тугіше, якщо вона заважає мантії. Але... чомусь лише ліву... Якщо маєте ніж, мабуть, зможете перешити той ґудзик на інший рукав."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Hands/Gloves/mantis_gloves_airy.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-folded
      map: ["foldedLayer"]
      visible: false
  - type: Clothing
    sprite: _DEN/Clothing/Hands/Gloves/mantis_gloves_airy.rsi
  - type: Fiber
    fiberColor: fibers-black
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-verb
    unfoldVerbText: unfold-verb
  - type: FoldableClothing
    foldedEquippedPrefix: folded
  - type: Butcherable # Butchering it makes the right sleeve foldable instead
    butcherDelay: 0.5
    butcheringType: Knife
    spawned:
    - id: ClothingHandsGlovesMantisAiryTailored
      amount: 1


- type: entity
  parent: ClothingHandsGlovesMantisAiry
  id: ClothingHandsGlovesMantisAiryTailored # The only way to fold the right sleeve under the mantle, since folding is only a toggle
  name: "легкі рукави Мантіса (підігнані)"
  description: "Рукави з широкими манжетами поверх рукавичок з петлями для пальців. Праву манжету можна затягнути тугіше, якщо вона заважає мантії. Але... чомусь лише праву... Якщо маєте ніж, мабуть, зможете перешити той ґудзик на інший рукав."
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Hands/Gloves/mantis_gloves_airy_tailored.rsi
  - type: Clothing
    sprite: _DEN/Clothing/Hands/Gloves/mantis_gloves_airy_tailored.rsi
  - type: Butcherable # Butchering it makes the left sleeve foldable again
    butcherDelay: 0.5
    butcheringType: Knife
    spawned:
    - id: ClothingHandsGlovesMantisAiry
      amount: 1
  - type: Tag
    tags:
    - MantisBeltStorable # So it doesn't appear in the chameleon list twice


- type: entity
  parent: ClothingHandsGlovesMantis
  id: ClothingHandsGlovesMantisDark
  name: "темні рукавички Мантіса"
  description: "Довгі рукавички без пальців з міцної тканини."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Hands/Gloves/mantis_gloves_dark.rsi
  - type: Clothing
    sprite: _DEN/Clothing/Hands/Gloves/mantis_gloves_dark.rsi
  - type: Fiber
    fiberColor: fibers-black


- type: entity
  parent: [ClothingHandsGlovesMantis, BaseFoldable]
  id: ClothingHandsGlovesMantisOrnate
  name: "оздоблений рукав Мантіса"
  description: "Плинний рукав, достатньо великий, щоб приховати руку, з електрумовими ланцюжками для оздоби іншої руки. Його можна носити з будь-якого боку, можливо, щоб сховати ланцюжки під мантією, якщо забажаєте."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Hands/Gloves/mantis_gloves_ornate.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-flipped
      map: ["foldedLayer"]
      visible: false
  - type: Clothing
    sprite: _DEN/Clothing/Hands/Gloves/mantis_gloves_ornate.rsi
  - type: Fiber
    fiberColor: fibers-black
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-flip-verb
    unfoldVerbText: fold-flip-verb
  - type: FoldableClothing
    foldedEquippedPrefix: flipped


- type: entity # So chameleon clothes can select the folded sprite
  parent: ClothingHandsGlovesMantisOrnate
  id: ClothingHandsGlovesMantisOrnateFlipped
  suffix: Flipped
  components:
  - type: Foldable
    folded: true
  - type: Clothing
    equippedPrefix: flipped


- type: entity
  parent: ClothingHandsGlovesMantis
  id: ClothingHandsGlovesMantisChains
  name: "ланцюжки на руки Мантіса"
  description: "Електрумові ланцюжки для оздоби рук. Може, ви тренуєтесь."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Hands/Gloves/mantis_gloves_chains.rsi
  - type: Clothing
    sprite: _DEN/Clothing/Hands/Gloves/mantis_gloves_chains.rsi
  - type: Item
    size: Tiny
  - type: Fiber
    fiberColor: fibers-gold

- type: entity
  parent: [ ClothingShoesBootsMantis, BaseFoldable ]
  id: ClothingShoesSandalsMantisAiry
  name: "легкі сандалі Мантіса"
  description: "Сандальні чоботи з похмурої тканини. Верхи можна загнути вниз, якщо вони заважають штанам."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Shoes/Sandals/mantis_sandals_airy.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-folded
      map: ["foldedLayer"]
      visible: false
  - type: Clothing
    sprite: _DEN/Clothing/Shoes/Sandals/mantis_sandals_airy.rsi
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-verb
    unfoldVerbText: unfold-verb
  - type: FoldableClothing
    foldedEquippedPrefix: folded



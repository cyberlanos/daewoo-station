- type: entity
  parent: ClothingMaskPullableBase
  id: ClothingMaskMantisVeil
  name: "вуаль Мантіса"
  description: "Прозора вуаль, оздоблена електрумовими кільцями. Добре пасує до пов’язки на очі."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Mask/mantis_mask_veil.rsi
  - type: Clothing
    sprite: _DEN/Clothing/Mask/mantis_mask_veil.rsi
  - type: Item
    size: Tiny
  - type: HideLayerClothing
    slots:
    - Snout
    hideOnToggle: true
  - type: BreathMask
  - type: Tag
    tags:
    - WhitelistChameleon
    - MantisBeltStorable


- type: entity
  parent: ClothingMaskBase
  id: ClothingMaskMantisRitual
  name: "маска звільненого від тягаря"
  description: "Позолочена поховальна маска, що нагадує давніх правителів; її риси згладжені до виразу спокійної остаточності."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Mask/mantis_mask_ritual.rsi
    layers:
    - state: icon
    - state: icon-glow
      shader: unshaded
  - type: Item
    sprite: _DEN/Clothing/Mask/mantis_mask_ritual.rsi
    inhandVisuals:
      left:
      - state: inhand-left
      - state: inhand-left-glow
        shader: unshaded
      right:
      - state: inhand-right
      - state: inhand-right-glow
        shader: unshaded
  - type: Clothing
    sprite: _DEN/Clothing/Mask/mantis_mask_ritual.rsi
    clothingVisuals:
      mask:
      - state: equipped-MASK
      - state: equipped-glow
        shader: unshaded
  - type: HideLayerClothing
    slots:
    - Snout
  - type: BreathMask
  - type: IdentityBlocker
    enabled: true
  - type: Tag
    tags:
    - WhitelistChameleon
    - MantisBeltStorable

- type: entity
  parent: [ClothingNeckBase, BaseFoldable]
  id: ClothingNeckCloakMantisDark
  name: dark mantis cloak
  description: "A billowing cloak that you can bundle around yourself, if you feel your traditional uniforms are too revealing. The brooch is a Greek psi."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Neck/Cloaks/mantis_cloak_dark.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-folded
      map: ["foldedLayer"]
      visible: false
  - type: Appearance
  - type: Clothing
    sprite: _DEN/Clothing/Neck/Cloaks/mantis_cloak_dark.rsi
  - type: Tag
    tags:
    - WhitelistChameleon
    - MantisBeltStorable
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-verb
    unfoldVerbText: unfold-verb
  - type: FoldableClothing
    foldedEquippedPrefix: folded


- type: entity # So chameleon clothes can select the folded sprite
  parent: ClothingNeckCloakMantisDark
  id: ClothingNeckCloakMantisDarkFolded
  suffix: Bundled
  components:
  - type: Foldable
    folded: true
  - type: Clothing
    equippedPrefix: folded


- type: entity
  parent: [ClothingNeckBase, BaseFoldable]
  id: ClothingNeckMantleMantisOrnate
  name: ornate mantis mantle
  description: "A long, finely-woven mantle generously decorated with tassles. It can easily be worn on either shoulder."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Neck/Mantles/mantis_mantle_airy.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-flipped
      map: ["foldedLayer"]
      visible: false
  - type: Appearance
  - type: Clothing
    sprite: _DEN/Clothing/Neck/Mantles/mantis_mantle_airy.rsi
  - type: Tag
    tags:
    - WhitelistChameleon
    - MantisBeltStorable
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-flip-verb
    unfoldVerbText: fold-flip-verb
  - type: FoldableClothing
    foldedEquippedPrefix: flipped


- type: entity # So chameleon clothes can select the folded sprite
  parent: ClothingNeckMantleMantisOrnate
  id: ClothingNeckMantleMantisOrnateFlipped
  suffix: Flipped
  components:
  - type: Foldable
    folded: true
  - type: Clothing
    equippedPrefix: flipped


- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckMantisShackles
  name: graven bindings
  description: "A set of massive mu-metal bindings with hanging chains. Merely symbolic unless paired with the graven shackles."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Neck/Misc/mantisshackles.rsi
  - type: Clothing
    sprite: _DEN/Clothing/Neck/Misc/mantisshackles.rsi
  - type: Tag
    tags:
    - MantisBoxRestraintsStorable
    - MantisBeltStorable


- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckMantisPendulum
  name: mantis pendulum
  description: "A mnemolith eye on a sturdy electrum chain, used to test psionic ability. It grows uncomfortably hot in the wielder's hand if the subject lacks the gift. Basically harmless, though its use tends to annoy the crew, so do consider asking first. The chain is long enough to clasp around your neck, should you feel inclined."
  components:
  - type: ItemToggle # You can toggle swinging it back and forth, though it's just cosmetic
    verbToggleOn: item-toggle-swingstart
    verbToggleOff: item-toggle-swingstop
    predictable: false
    soundActivate:
      path: /Audio/Effects/toss.ogg
      params:
        volume: -6
        pitch: 1.3
        variation: 0.05
    soundDeactivate:
      path: /Audio/Effects/weak_hit2.ogg
      params:
        volume: -9
        pitch: 1.3
        variation: 0.05
  - type: UseDelay
    delay: 0.92 # This is just under one swing animation
  - type: Appearance
  - type: ToggleableVisuals
    spriteLayer: null # Swinging it only changes the inhand sprites
    inhandVisuals:
      left:
      - state: swinging-inhand-left
      right:
      - state: swinging-inhand-right
  - type: Sprite
    sprite: _DEN/Clothing/Neck/Misc/mantispendulum.rsi
  - type: Item
    sprite: _DEN/Clothing/Neck/Misc/mantispendulum.rsi
  - type: Clothing
    sprite: _DEN/Clothing/Neck/Misc/mantispendulum.rsi
  #- type: AntiPsionicWeapon
  #  punish: true # It'll hurt you if you bonk anything non-psionic (a mouse, a wall, etc.)
  #  punishChances: 1 # Every time
  #  punishSelfDamage: 1 # Bonk
  #  punishStunDuration: 0 # It's just a little amulet, it won't stun you
  - type: MeleeWeapon
    attackRate: 1.6
    #maxTargets: 1
    angle: 90
    soundHit:
      path: /Audio/_DEN/Effects/crystaltap3.ogg
      params:
        volume: -6
        variation: 0.05
    damage:
      types: # Melee damage (per the description, it's for testing psionic ability, not fighting)
        Blunt: 1 # 1.5 DPS, or 1.88 DPS against psions
        Holy: 0.5 # 2.81 total DPS against psionic supernaturals
  - type: Tag
    tags:
    - WhitelistChameleon
    - MantisBeltStorable

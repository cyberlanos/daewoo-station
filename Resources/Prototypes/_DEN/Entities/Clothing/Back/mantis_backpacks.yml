- type: entity # The mantis backpacks are a bit smaller visually to show off their clothes
  parent: [ClothingBackpack, BaseFoldable]
  id: ClothingBackpackMantis
  name: "рюкзак Мантіса"
  description: "Низькопрофільний рюкзак для Мантіса, позначений грецькою пси з електруму. Спроєктований із кліпсами, що ідеально пасують до вашої уніформи, дозволяючи за бажанням зняти ремінь."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Back/Backpacks/mantis.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-flipped
      map: ["foldedLayer"]
      visible: false
  - type: Appearance
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-verb
    unfoldVerbText: unfold-verb
  - type: FoldableClothing
    foldedEquippedPrefix: flipped


- type: entity # So chameleon clothes can select the folded sprite
  parent: ClothingBackpackMantis
  id: ClothingBackpackMantisFlipped
  suffix: Flipped
  components:
  - type: Foldable
    folded: true
  - type: Clothing
    equippedPrefix: flipped


- type: entity
  parent: [ClothingBackpackDuffel, BaseFoldable]
  id: ClothingBackpackDuffelMantis
  name: "речовий мішок Мантіса"
  description: "Відносно низькопрофільний речовий мішок для Мантіса з плетеною ручкою. Спроєктований із кліпсами, що ідеально пасують до вашої уніформи, дозволяючи за бажанням зняти ремінь."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Back/Duffels/mantis.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-flipped
      map: ["foldedLayer"]
      visible: false
  - type: Appearance
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-verb
    unfoldVerbText: unfold-verb
  - type: FoldableClothing
    foldedEquippedPrefix: flipped


- type: entity # So chameleon clothes can select the folded sprite
  parent: ClothingBackpackDuffelMantis
  id: ClothingBackpackDuffelMantisFlipped
  suffix: Flipped
  components:
  - type: Foldable
    folded: true
  - type: Clothing
    equippedPrefix: flipped


- type: entity
  parent: ClothingBackpackSatchel
  id: ClothingBackpackSatchelMantis
  name: "сумка Мантіса"
  description: "Низькопрофільна сумка для Мантіса, що чіпляється до задньої частини пояса й має грецьку пси на клапані. Мабуть, єдина сумка, яка не чіплятиметься за рукави вашої роби."
  components: # Intentionally only visible when facing north, since multiple mantis gloves have big detached sleeves
  - type: Sprite # Backpacks layer over gloves when facing east or west, so this is the only option that will never do that
    sprite: _DEN/Clothing/Back/Satchels/mantis.rsi


- type: entity
  parent: [ClothingBackpackSatchel, BaseFoldable]
  id: ClothingBackpackSatchelMantisPurse
  name: "ручна сумка Мантіса"
  description: "Низькопрофільна ручна сумка для Мантіса з полірованою застібкою. Її можна носити на будь-якому плечі, і вона легко ховається під плащем."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Back/Satchels/mantispurse.rsi


- type: entity # So chameleon clothes can select the folded sprite
  parent: ClothingBackpackSatchelMantisPurse
  id: ClothingBackpackSatchelMantisPurseFlipped
  suffix: Flipped
  components:
  - type: Foldable
    folded: true
  - type: Clothing
    equippedPrefix: flipped

- type: entity
  parent: [ClothingBackpackMessengerBase, BaseFoldable]
  id: ClothingBackpackMessengerMantis
  name: "кур’єрська сумка Мантіса"
  description: "Низькопрофільна кур’єрська сумка для Мантіса в електрумовій оболонці у формі пильного ока. Ремінь можна перекинути на інший бік."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Back/Messenger/mantis.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-flipped
      map: ["foldedLayer"]
      visible: false
  - type: Appearance
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-verb
    unfoldVerbText: unfold-verb
  - type: FoldableClothing
    foldedEquippedPrefix: flipped


- type: entity # So chameleon clothes can select the folded sprite

- type: entity
  parent: [ClothingOuterWinterCoatMantis, BaseFoldable]
  id: ClothingOuterWinterCoatMantisDark
  name: "темне пальто Мантіса"
  description: "Величне тепле пальто з високим коміром. Рукави можна закотити до плечей, щоб похизуватися рукавичками."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/OuterClothing/WinterCoats/mantis_winter_coat_dark.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-rolled
      map: ["foldedLayer"]
      visible: false
  - type: Clothing
    sprite: _DEN/Clothing/OuterClothing/WinterCoats/mantis_winter_coat_dark.rsi
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-rollsleeves-verb
    unfoldVerbText: fold-unrollsleeves-verb
  - type: FoldableClothing
    foldedEquippedPrefix: rolled


- type: entity # The default mantis coat in loadout
  parent: ClothingOuterWinterCoatMantisDark
  id: ClothingOuterWinterCoatMantisDarkFolded
  suffix: Rolled Sleeves
  description: "Величне тепле пальто з високим коміром. Рукави можна розкотити, якщо вони не заважатимуть рукавичкам."
  components:
  - type: Foldable
    folded: true
  - type: Clothing
    equippedPrefix: rolled


- type: entity
  parent: ClothingOuterWinterCoatMantis
  id: ClothingOuterWinterCoatMantisMu
  name: "табар Мантіса з мю-металу"
  description: "Теплий табар з мотивом ока на розрізному комірі. Тканину прикрашають диски з мю-металу, які, як кажуть, допомагають Мантісу регулювати свої сили, принаймні теоретично."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/OuterClothing/WinterCoats/mantis_winter_coat_mu.rsi
  - type: Clothing
    sprite: _DEN/Clothing/OuterClothing/WinterCoats/mantis_winter_coat_mu.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.65
        Slash: 0.6
        Piercing: 0.8

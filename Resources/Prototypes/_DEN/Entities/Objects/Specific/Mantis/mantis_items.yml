- type: entity
  parent: BaseChemistryEmptyBottle
  id: ChemistryEmptyBottleMantis
  name: electrum bottle
  description: "An eidolite bottle in a durable electrum shell. Useful for your rituals."
  components:
  - type: Sprite
    sprite: _DEN/Objects/Specific/Mantis/bottlemantis.rsi
    layers:
      - state: bottle
      - state: bottle-1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Item
    sprite: _DEN/Objects/Specific/Mantis/bottlemantis.rsi
  - type: SolutionContainerVisuals
    maxFillLevels: 6
    fillBaseName: bottle-
  - type: DamageOnLand
    damage:
      types:
        Blunt: 0 # Metal shell
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 0 # Metal shell
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 1 # Doink
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic # Metal shell
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 10
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak # There's still a crystal interior
          params:
            volume: -4
      - !type:SpillBehavior { }
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Tag
    tags:
    - Bottle
    - MantisBeltStorable
    - MantisBoxChemicalsStorable



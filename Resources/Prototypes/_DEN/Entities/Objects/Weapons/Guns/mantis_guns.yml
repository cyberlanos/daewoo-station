- type: entity
  parent: BaseWeaponPowerCell
  id: BaseMantisRanged # Lorewise, they use altered and contained anomaly cores to generate physical ammo
  abstract: true # But codewise, they're just battery guns that look and sound like they're shooting ballistics
  components:
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    size: Normal # Defaults to a 2x2 square
  - type: Clothing
    quickEquip: false
    slots:
    - suitStorage
  - type: Gun
    #fireOnDropChance: 0.1
    soundEmpty:
      path: /Audio/_DV/Weapons/Guns/Empty/dry_fire.ogg
      params:
        volume: -5
        variation: 0.05
  - type: MagazineVisuals
    magState: mag
    zeroVisible: true
  #- type: ItemSlots # These guns in the game yet and are causing build errors, will repair in the upcoming caster pr
  #  slots:
  #    gun_magazine:
  #      name: Magazine
  #      startingItem: null
  #      whitelist:
  #        tags:
  #        - MantisCaster
  - type: Execution
  - type: MeleeWeapon
    attackRate: 1.2
    damage:
      types:
        Blunt: 7.5
    wideAnimationRotation: 90
    soundHit:
      collection: MetalThud
  - type: ThrowingAngle
    angle: -90
    angularVelocity: true
  - type: Tag
    tags:
    - MantisBeltStorable



- type: entity
  parent: [Cane]
  id: MantisMeleeCane
  name: gnomon
  description: "An amaranth cane crowned with an eidolite crystal. If flipped in the hand, the needle-sharp mnemolith tip serves as a thrusting weapon. A refined accessory, practical for mantes with limited mobility. Deadly when wielded against psionic and otherworldly threats."
  components:
  - type: Item
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantiscane.rsi
    size: Normal
    shape:
    - 0,0,1,1 # To override the default cane size
  - type: Sprite
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantiscane.rsi
    layers:
    - state: icon
      map: ["icon"]
    - state: icon-raised
      map: ["icon-raised"]
      visible: false
  - type: Appearance
  - type: ToggleableVisuals
    spriteLayer: icon-raised
    inhandVisuals:
      left:
      - state: raised-inhand-left
        map: ["left-raised"]
      right:
      - state: raised-inhand-right
        map: ["right-raised"]
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        icon:
          True: { visible: false }
          False: { visible: true }
        icon-raised:
          True: { visible: true }
          False: { visible: false }
  - type: ItemToggle
    verbToggleOn: item-toggle-raise
    verbToggleOff: item-toggle-lower
    predictable: false
    soundActivate:
      path: /Audio/_DEN/Weapons/Melee/rapiermiss.ogg
      params:
        volume: -5
        pitch: 1.1
        variation: 0.05
    soundDeactivate:
      path: /Audio/_DEN/Weapons/Melee/rapiermiss.ogg
      params:
        volume: -5
        pitch: 0.9
        variation: 0.05
  - type: ItemToggleMeleeWeapon
    activatedDamage:
      types: # If you flip it, you stab them with the point
        Piercing: 10 # 15 DPS (same as CombatKnife), or 18.75 DPS against psions
        Holy: 5 # 28.13 total DPS against psionic supernaturals
    activatedSoundOnHit:
      path: /Audio/Weapons/bladeslice.ogg
      params:
        variation: 0.05
    activatedSoundOnHitNoDamage:
      path: /Audio/_DEN/Weapons/Melee/rapiermiss.ogg
      params:
        variation: 0.05
    activatedSoundOnSwing:
      path: /Audio/_DEN/Weapons/Melee/rapiermiss.ogg
      params:
        variation: 0.05
    deactivatedSoundOnHit:
      collection: WeakHit
      params:
        variation: 0.05
    deactivatedSoundOnHitNoDamage:
      collection: WeakHit
      params:
        variation: 0.05
  - type: UseDelay
    delay: 0.5 # Just a small one so you don't hit it twice accidentally
  - type: MeleeWeapon
    attackRate: .6666
    wideAnimationRotation: -135
    damage:
      types: # If you don't flip it, you just bonk them
        Blunt: 5 # 7.5 DPS (same as Crowbar)
  #- type: AntiPsionicWeapon # To override the +25% blunt damage against psions, because the bonking part isn't made of mnemolith
  #  modifiers:
  #    coefficients:
  #      Piercing: 1.25
  #      Holy: 1.25
  #- type: ItemToggleDamageOtherOnHit
  #- type: ItemToggleEmbeddableProjectile
 #   activatedEmbedOnThrow: true
 #   activatedSound: /Audio/Weapons/star_hit.ogg
 #   activatedRemovalTime: 2
 # - type: ItemToggleEmbedPassiveDamage
  - type: ThrowingAngle
    angle: -135
  #- type: StaminaDamageOnHit
  #  damage: 0
  - type: Tag
    tags:
    - MantisCane
    - MantisBeltStorable


- type: entity
  parent: BaseItem # TailorsKnife not available
  id: MantisTailorsKnife
  name: ravel
  description: "A mnemolith tailor's knife, presumably stolen from whoever designed these new uniforms. You rat. The hole in the handle is just big enough to spin it around your finger, though this serves no purpose."
  components:
  - type: Sprite
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantistailorsknife.rsi
  - type: Item
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantistailorsknife.rsi
  - type: MeleeWeapon
    damage:
      types:
        Slash: 5.5 # 6.11 DPS (same as Shiv), or 7.64 DPS against psions (same as Crowbar)
        Holy: 2.75 # 11.25 total DPS against psionic supernaturals
  - type: Tag
    tags:
    - Knife
    - MantisBeltStorable


- type: entity
  parent: CombatKnife # BaseKnifeSpinnable not available
  id: MantisMeleeKnife
  name: athame
  description: "A mnemolith knife shaped like a claw, its back lined with swordbreaker teeth--though it remains unclear who, exactly, is drawing blades against mantes. The finger ring improves grip and allows for idle spinning tricks, though they serve no tactical purpose. Deadly when wielded against psionic and otherworldly threats."
  components:
  - type: Sprite
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantisknife.rsi
  - type: Item
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantisknife.rsi
    storedSprite: null # To override CombatKnife
  - type: MeleeWeapon
    attackRate: .6666
    angle: 40 # Standard knife swing, here for reference
    damage:
      types:
        Slash: 10 # 15 DPS (same as CombatKnife), or 18.75 DPS against psions
        Holy: 5 # 28.13 total DPS against psionic supernaturals
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/star_hit.ogg
    #removalTime: 2.0
  #- type: EmbedPassiveDamage
  - type: Tag
    tags:
    - Knife
    - MantisKnife
    - MantisBeltStorable


- type: entity
  parent: CombatKnife # BaseKnifeSpinnable not available
  id: MantisMeleeSickle
  name: boline
  description: "A heavy mnemolith sickle set with an eidolite eye, crafted as the athame's more savage counterpart, suited for sweeping, methodical strikes. The finger ring allows for idle spinning tricks, though they serve no tactical purpose. Deadly when wielded against psionic and otherworldly threats."
  components:
  - type: ItemToggle
    soundActivate:
      path: /Audio/Effects/toss.ogg # Spin
      params:
        volume: -6
        pitch: 0.9
        variation: 0.05
    soundDeactivate:
      path: /Audio/Effects/weak_hit2.ogg # Catch
      params:
        volume: -9
        pitch: 0.9
        variation: 0.05
  - type: Sprite
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantissickle.rsi
  - type: Item
    size: Normal
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantissickle-inhands-64x.rsi
    storedSprite: null # To override CombatKnife
  - type: MeleeWeapon
    attackRate: 1.3333 # Twice as slow as the athame, but twice the damage, so same DPS
    angle: 60 # Swings a little wider wider than the athame, but easier to disarm
    damage:
      types:
        Slash: 20 # 15 DPS (same as CombatKnife), or 18.75 DPS against psions
        Holy: 10 # 28.13 total DPS against psionic supernaturals
  - type: DisarmMalus
    malus: 0.1125 # Half as hard to disarm as CombatKnife, too big for the finger ring to help
  - type: MeleeThrowOnHit # Just a tiny knockback to look cool, barely moves anything
    speed: 3
    #lifetime: 0.025 # AS: remove unsued components
  - type: UseDelay # Aurora
    delay: 3 # Aurora
  - type: UseDelayOnMeleeHit # Aurora
  - type: Tag
    tags:
    - Knife
    - MantisSickle
    - MantisBeltStorable


- type: entity
  parent: ClothingHandsBase # ClothingHandsInedibleBase not available
  id: MantisMeleeFist
  name: manifold
  description: "A heavy mnemolith gauntlet designed for control rather than sheer lethality, capable of hurling foes back and, at times, deflecting incoming fire. Said to take its name from its capacity for folding men, and its clever design allows it to be worn on either hand. Deadly when wielded against psionic and otherworldly threats."
  components:
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-flip-verb
    unfoldVerbText: fold-flip-verb
  - type: FoldableClothing
    foldedEquippedPrefix: flipped
  - type: Sprite
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantisfist.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-flipped
      map: ["foldedLayer"]
      visible: false
  - type: Appearance
  - type: Item
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantisfist.rsi
    size: Normal
  - type: Clothing
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantisfist.rsi
  - type: MeleeWeapon
    bluntStaminaDamageFactor: 1.25 # Stuns in 6 hits (which takes 6 seconds)
    attackRate: 1.0 # A bit slower than the other weapons
    range: 1.5
    angle: 60
    damage:
      types:
        Blunt: 12 # 12 DPS, or 15 DPS against psions (same as CombatKnife)
        Holy: 6 # 22.5 total DPS against psionic supernaturals
        Structural: 7.5 # 5 structural DPS
    soundHit:
      path: /Audio/_Impstation/Weapons/nullglove.ogg
      params:
        variation: 0.15
    animation: WeaponArcPunch
    wideAnimation: WeaponArcSmash
    mustBeEquippedToUse: true
  - type: MeleeThrowOnHit # They fly about six tiles and don't take extra impact damage when hitting walls
    speed: 10
    distance: 3
  - type: Reflect
    reflectProb: .2
    spread: 135
  - type: Fiber
    fiberColor: fibers-bluish
    fiberMaterial: fibers-insulative
  - type: Tag
    tags:
    - WhitelistChameleon
    - MantisFist
    - MantisBeltStorable
  - type: UseDelay # Aurora
    delay: 3 # Aurora
  - type: UseDelayOnMeleeHit # Aurora


- type: entity # So chameleon clothes can select the folded sprite
  parent: MantisMeleeFist
  id: MantisMeleeFistFlipped
  suffix: Flipped
  components:
  - type: Foldable
    folded: true
  - type: Clothing
    equippedPrefix: flipped


- type: entity
  parent: MantisMeleeFist # Traitor version, loosely comparable to BaseBallBatHomeRun, but with less damage and knockback because it's wearable
  id: MantisMeleeFistDouble
  name: twinned manifold
  description: "Heavy mnemolith gauntlets forged through forbidden rituals, capable of hurling foes back and, at times, deflecting incoming fire. Said to take their name from their capacity for folding men. Deadly when wielded against psionic and otherworldly threats."
  components:
  - type: Sprite
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantisfistdouble.rsi
    state: icon
  - type: Clothing
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantisfistdouble.rsi
  - type: MeleeWeapon
    bluntStaminaDamageFactor: 1.35 # Stuns in 5 hits (which takes 5 seconds, compared to BaseBallBatHomeRun's 4.5)
    damage:
      types:
        Blunt: 15 # 15 DPS (same as CombatKnife), or 18.75 DPS against psions
        Holy: 7.5 # 28.13 total DPS against psionic supernaturals
        Structural: 11.25 # 7.5 structural DPS (same as BaseBallBat)
  - type: MeleeThrowOnHit # They just go sailing and do hit walls hard enough to hurt (still only 2/3rds as fast as BaseBallBatHomeRun)
    speed: 20
    distance: 6
    #lifetime: 5
  - type: FingerprintMask # Both hands are covered, so they hide fingerprints


- type: entity # Please expect this to need rebalancing...
  parent: BaseSword # Aurora: Remove psionic and mantis contra
  id: MantisMeleeGreatsword # The risk/reward option, highly likely to knock you on your ass and get you killed, extremely difficult to use effectively
  name: faust # Part of the reason it's so punishing, aside from the challenge, is because antags could possibly use it against psions - it needs to be unreliable
  description: "A mnemolith greatsword whose unstable resonance makes it treacherous to wield. It must be properly wielded--without absolute focus, the blade resists. Unmatched against psionic and otherworldly threats." # Aurora: Adjusted description
  components: # Yes the description is long, but players must understand how it works from description alone, and I want it to remain in-universe
  - type: Grammar # Faust is its name
    attributes:
      proper: true
  #- type: AntiPsionicWeapon
  #  punish: true # It'll hurt you if you hit anything non-psionic (a mouse, a wall, etc.)
  #  punishChances: 1 # Every time
  #  punishSelfDamage: 35 # It hits you as hard as you would've hit a psion, because you're psionic
  #  punishStunDuration: 5 # And it stuns you like a noospheric storm
  - type: MeleeRequiresWield
    #fumbleOnAttempt: true # It'll also stun you if you try to swing it one-handed
  - type: Wieldable
    wieldSound:
      path: /Audio/_DEN/Weapons/Melee/faustwield.ogg
      params:
        volume: -2
        variation: 0.05
    unwieldSound:
      path: /Audio/_DEN/Weapons/Melee/faustunwield.ogg
      params:
        volume: -2
        variation: 0.05
    useDelayOnWield: false # Aurora
  - type: MeleeWeapon
    attackRate: 1 # Aurora: Adjusted from 1.5
    range: 1.85
    wideAnimationRotation: -120 # Swing that thing
    damage:
      types:
        Slash: 30 # 18.66 DPS (same as CaptainSabre), or 23.33 DPS against psions (but if you miss, it hits you hard) # Aurora: Up that to 30 dps, t5
        Holy: 20 # 40 total DPS against psionic supernaturals (no way are you landing every left click on a simplemob) # Doesn't do much on aurora, but its good flavor
        Structural: 30 # 20 structural DPS (but it'll only hurt psionic objects since it can't be thrown)
    soundHit:
      path: /Audio/_DEN/Weapons/Melee/fausthit.ogg
      params:
        volume: -2
        variation: 0.05
    soundSwing:
      path: /Audio/_DEN/Weapons/Melee/faustmiss.ogg
      params:
        volume: -2
        variation: 0.05
    soundNoDamage:
      path: /Audio/_DEN/Weapons/Melee/fausthit.ogg
      params:
        volume: -2
        variation: 0.05
  - type: DamageOtherOnHit
    damage:
      types:
        #staminaCost: 80 # Throwing it will nearly stun you, unless your species or traits let you do it, but then you'll still be extremely slow and unarmed #Aurora: Commented out
        Slash: 30 # Aurora: Added throwing damage
        Holy: 20
  - type: EmbeddableProjectile
    sound:
      path: /Audio/_DEN/Weapons/Melee/fausthit.ogg
      params:
        volume: -2
        variation: 0.05
    #removalTime: 2
  #- type: EmbedPassiveDamage # If people use this to cheese, remove it # As: Commented out
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DEN/Weapons/Melee/fausthit.ogg
      params:
        volume: -2
        variation: 0.05
  - type: Sprite
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantisgreatsword.rsi
    state: icon
  - type: Item
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantisgreatsword-inhands-64x.rsi
    size: Ginormous # This doesn't go inside anything except its sheath
    storedSprite:
      state: icon
      sprite: _DEN/Objects/Weapons/Melee/Mantis/mantisgreatsword.rsi # Same sprite, just rotated, because it looks wrong otherwise
  - type: ThrowingAngle
    angle: -135
  - type: MeleeThrowOnHit # Just a tiny knockback to look cool, barely moves anything
    speed: 6
    distance: 3
   # lifetime: 0.05
  - type: UseDelay # Aurora
    delay: 3 # Aurora
  - type: UseDelayOnMeleeHit # Aurora
  - type: Reflect # A little gift for being brave
    reflectProb: .25
    spread: 90
  - type: Tag
    tags:
    - MantisGreatsword


- type: entity
  parent: [BaseItem, BaseFoldable]
  id: MantisMeleeGreatswordSheath # A suitstorage sheath for Faust, in this file because it's basically part of the sword
  name: foreboding scabbard
  suffix: Faust, Empty
  description: "A heavy scabbard reinforced with mu-metal bands that cross over its ornamental eyes, likely as a warning. This psionically insulating metal is only used to contain weapons that would otherwise recoil violently against their housing when drawn. Its stillness feels wrong, as if the scabbard itself is holding its breath. So heavy it can only be worn over outerwear--and the weapon within so long it must be drawn with telekinesis."
  components:
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-verb
    unfoldVerbText: unfold-verb
  - type: FoldableClothing
    foldedEquippedPrefix: flipped # This should've always been "folded" to play nicer with BaseFoldable
  - type: Sprite
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantisgreatswordsheath.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-flipped
      map: ["foldedLayer"]
      visible: false
  - type: Item
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantisgreatswordsheath.rsi
    size: Ginormous
  - type: Clothing
 #   quickEquip: true
 #   equipDelay: 0.5
 #   unequipDelay: 0.5
    slots:
    - suitStorage
  - type: ThrowingAngle
    angularVelocity: true
  - type: EmitSoundOnThrow
    sound:
      path: /Audio/_DEN/Weapons/Melee/bigswoosh.ogg
      params:
        volume: -3
        variation: 0.05
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Effects/metal_slam1.ogg
      params:
        volume: -3
        pitch: 0.9
        variation: 0.05
  - type: EmitSoundOnCollide
    sound:
      path: /Audio/Effects/metal_slam4.ogg
      params:
        volume: -6
        pitch: 1.1
        variation: 0.05
  - type: Appearance
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      mantisgreatsword: !type:ContainerSlot {}
  - type: ItemSlots
    slots:
      mantisgreatsword:
        name: clothing-suitstorage-mantisgreatsword
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound:
          path: /Audio/_DEN/Weapons/Melee/faustsheath.ogg
          params:
            volume: -2
            variation: 0.05
        ejectSound:
          path: /Audio/_DEN/Weapons/Melee/faustunsheath.ogg
          params:
            volume: -2
            variation: 0.05
        whitelist:
          tags:
          - MantisGreatsword
        priority: 3
  - type: ItemMapper
    mapLayers:
      mantisgreatsword:
        whitelist:
          tags:
          - MantisGreatsword
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantisgreatswordsheath.rsi


- type: entity
  parent: MantisMeleeGreatswordSheath
  id: MantisMeleeGreatswordSheathFilled
  suffix: Faust, Filled, DO NOT MAP
  components:
  - type: ContainerFill
    containers:
      mantisgreatsword:
      - MantisMeleeGreatsword

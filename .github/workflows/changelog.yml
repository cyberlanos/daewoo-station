name: PR Changelogs
concurrency: commit_action
on:
  pull_request_target:
    types: [closed]

env:
  #GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }} # Pirates use the automatically provided GITHUB_TOKEN instead of an undefined BOT_TOKEN
  CHANGELOG_DIR: ${{ vars.CHANGELOG_DIR || 'Resources/Changelog' }} # Pirate
  CHANGELOG_BRANCH: ${{ vars.CHANGELOG_BRANCH || 'master' }} # Pirate
  PR_NUMBER: ${{ github.event.number }}

jobs:
  changelog:
    runs-on: ubuntu-latest # Pirate
    if: github.event.pull_request.merged == true
    permissions:
      contents: write
    steps:
      - name: Checkout Master
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Pirate
          ref: "${{ env.CHANGELOG_BRANCH }}"

      # Pirate add
      - name: Setup Git
        env:
         CHANGELOG_USER: ${{ vars.CHANGELOG_USER }}
         CHANGELOG_EMAIL: ${{ vars.CHANGELOG_EMAIL }}
         ACTOR_NAME: ${{ github.actor }}
         ACTOR_ID: ${{ github.actor_id }}
        run: |
         # Use provided vars if present, otherwise fall back to the actor and noreply email
         GIT_NAME="${CHANGELOG_USER:-$ACTOR_NAME}"
         GIT_EMAIL="${CHANGELOG_EMAIL:-${ACTOR_ID}+${ACTOR_NAME}@users.noreply.github.com}"
         git config --global user.name "$GIT_NAME"
         git config --global user.email "$GIT_EMAIL"
        shell: bash
      # Pirate end

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - name: Install Dependencies
        run: |
          cd "Tools/changelog"
          npm install
        shell: bash

      - name: Generate Changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Pirate
        run: |
          cd "Tools/changelog"
          node changelog.js
        shell: bash

      # Pirate change commit summary
      - name: Commit Changelog
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            git add -A -- "${{ env.CHANGELOG_DIR }}/*.yml"

            if git diff --cached --quiet -- "${{ env.CHANGELOG_DIR }}/*.yml"; then
              echo "No staged changelog changes to commit."
              exit 0
            fi

            git commit -m "Automated changelog - (#${{ env.PR_NUMBER }})"

            if git push origin "HEAD:${{ env.CHANGELOG_BRANCH }}"; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Failed to push changelog commit after ${attempt} attempts."
              exit 1
            fi

            echo "Push was rejected, refreshing ${{ env.CHANGELOG_BRANCH }} and regenerating changelog."
            git fetch --no-tags origin "${{ env.CHANGELOG_BRANCH }}"
            git reset --hard "origin/${{ env.CHANGELOG_BRANCH }}"

            (
              cd "Tools/changelog"
              GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" node changelog.js
            )
          done
        shell: bash
